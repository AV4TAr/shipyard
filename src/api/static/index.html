// ===== Config Editor =====
let _configData = null;
let _constraintsData = null;

async function renderConfig() {
  app.innerHTML = `
    <div class="section-header">
      <h1 class="section-title">Pipeline Configuration</h1>
      <div style="display:flex;gap:0.5rem">
        <button class="btn" onclick="configReset()" id="config-reset-btn">Reset</button>
        <button class="btn btn-primary" onclick="configSave()" id="config-save-btn">Save Changes</button>
      </div>
    </div>
    <div id="config-editor">
      <div class="loading-state"><div class="spinner spinner-lg"></div><span>Loading configuration...</span></div>
    </div>
  `;
  await loadConfigEditor();
}

async function loadConfigEditor() {
  const container = document.getElementById('config-editor');
  try {
    const [cfg, cst] = await Promise.all([
      api.get('/config'),
      api.get('/config/constraints'),
    ]);
    _configData = cfg;
    _constraintsData = cst;
    renderConfigSections(container, cfg, cst);
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-text">Error: ${escapeHtml(e.message)}</div></div>`;
  }
}

function renderConfigSections(container, cfg, cst) {
  container.innerHTML = `
    ${renderPipelineSection(cfg.pipeline || {})}
    ${renderThresholdsSection(cfg.risk_thresholds || {})}
    ${renderSignalWeightsSection(cfg.signal_weights || {})}
    ${renderRiskFactorWeightsSection(cfg.risk_factor_weights || {})}
    ${renderDeployRoutesSection(cfg.deploy_routes || {})}
    ${renderTrustSection(cfg.trust || {})}
    ${renderSandboxSection(cfg.sandbox || {})}
    ${renderLeasesSection(cfg.leases || {})}
    ${renderMonitoringSection(cfg.monitoring || {})}
    ${renderConstraintsEditorSection(cst)}
  `;
}

function cfgSectionCard(title, id, content) {
  return `
    <div class="card" style="margin-bottom:1rem">
      <div class="card-body">
        <h3 style="margin-bottom:1rem;color:var(--text-primary);font-size:1.1rem">${escapeHtml(title)}</h3>
        <div id="cfg-${id}" class="config-grid">
          ${content}
        </div>
      </div>
    </div>
  `;
}

function cfgNumberInput(section, key, value, label, opts = {}) {
  const min = opts.min !== undefined ? opts.min : '';
  const max = opts.max !== undefined ? opts.max : '';
  const step = opts.step || (opts.max === 1 ? '0.01' : '1');
  const hint = opts.hint ? `<div class="config-hint">${escapeHtml(opts.hint)}</div>` : '';
  return `
    <div class="config-field">
      <label class="config-label">${escapeHtml(label)}</label>
      ${hint}
      <input type="number" class="config-input" data-section="${escapeHtml(section)}" data-key="${escapeHtml(key)}"
             value="${value}" min="${min}" max="${max}" step="${step}">
    </div>
  `;
}

function cfgSlider(section, key, value, label, opts = {}) {
  const min = opts.min !== undefined ? opts.min : 0;
  const max = opts.max !== undefined ? opts.max : 1;
  const step = opts.step || 0.01;
  const hint = opts.hint ? `<div class="config-hint">${escapeHtml(opts.hint)}</div>` : '';
  return `
    <div class="config-field">
      <label class="config-label">${escapeHtml(label)}</label>
      ${hint}
      <div style="display:flex;align-items:center;gap:0.75rem">
        <input type="range" class="config-slider" data-section="${escapeHtml(section)}" data-key="${escapeHtml(key)}"
               value="${value}" min="${min}" max="${max}" step="${step}"
               oninput="this.nextElementSibling.textContent=this.value">
        <span class="config-slider-value" style="min-width:3rem;font-family:var(--font-mono);color:var(--text-primary)">${value}</span>
      </div>
    </div>
  `;
}

function cfgToggle(section, key, value, label, opts = {}) {
  const hint = opts.hint ? `<div class="config-hint">${escapeHtml(opts.hint)}</div>` : '';
  return `
    <div class="config-field">
      <label class="config-label">${escapeHtml(label)}</label>
      ${hint}
      <label class="config-toggle">
        <input type="checkbox" data-section="${escapeHtml(section)}" data-key="${escapeHtml(key)}" ${value ? 'checked' : ''}>
        <span class="config-toggle-track"></span>
      </label>
    </div>
  `;
}

function cfgTextInput(section, key, value, label, opts = {}) {
  const hint = opts.hint ? `<div class="config-hint">${escapeHtml(opts.hint)}</div>` : '';
  return `
    <div class="config-field">
      <label class="config-label">${escapeHtml(label)}</label>
      ${hint}
      <input type="text" class="config-input" data-section="${escapeHtml(section)}" data-key="${escapeHtml(key)}"
             value="${escapeHtml(String(value))}">
    </div>
  `;
}

function cfgSelect(section, key, value, label, options, opts = {}) {
  const hint = opts.hint ? `<div class="config-hint">${escapeHtml(opts.hint)}</div>` : '';
  return `
    <div class="config-field">
      <label class="config-label">${escapeHtml(label)}</label>
      ${hint}
      <select class="config-input" data-section="${escapeHtml(section)}" data-key="${escapeHtml(key)}">
        ${options.map(o => `<option value="${escapeHtml(o)}" ${o === value ? 'selected' : ''}>${escapeHtml(o)}</option>`).join('')}
      </select>
    </div>
  `;
}

function renderPipelineSection(p) {
  return cfgSectionCard('Pipeline', 'pipeline', `
    ${cfgNumberInput('pipeline', 'max_sandbox_iterations', p.max_sandbox_iterations || 5, 'Max Sandbox Iterations', {min: 1, max: 50, hint: 'How many test-fix cycles an agent gets before failing. Higher = more retries, slower feedback.'})}
    ${cfgNumberInput('pipeline', 'sandbox_timeout', p.sandbox_timeout || 300, 'Sandbox Timeout (s)', {min: 1, max: 3600, hint: 'Max seconds for sandbox execution. Too low may kill complex tasks; too high wastes resources on stuck agents.'})}
    ${cfgToggle('pipeline', 'auto_rollback_enabled', p.auto_rollback_enabled !== false, 'Auto Rollback', {hint: 'When ON, deploys that trigger anomaly detection are automatically reverted. Turn OFF for manual rollback only.'})}
  `);
}

function renderThresholdsSection(t) {
  return cfgSectionCard('Risk Thresholds', 'risk_thresholds', `
    <div style="grid-column:1/-1;margin-bottom:0.25rem" class="config-hint">Changes with a risk score above a threshold are classified at that level. This controls which deploy route they take.</div>
    ${cfgSlider('risk_thresholds', 'critical', t.critical || 0.85, 'Critical', {hint: 'Requires human approval + canary deploy. Lower this to be more cautious.'})}
    ${cfgSlider('risk_thresholds', 'high', t.high || 0.60, 'High', {hint: 'Requires human approval. Lower this to flag more changes for human review.'})}
    ${cfgSlider('risk_thresholds', 'medium', t.medium || 0.35, 'Medium', {hint: 'Goes through agent review. Lower this to send fewer changes to auto-deploy.'})}
    ${cfgSlider('risk_thresholds', 'low', t.low || 0, 'Low', {hint: 'Auto-deployed with no review. Raise this to require review for near-trivial changes.'})}
  `);
}

function renderSignalWeightsSection(sw) {
  return cfgSectionCard('Signal Weights', 'signal_weights', `
    <div style="grid-column:1/-1;margin-bottom:0.25rem" class="config-hint">These weights control how much each validation signal influences the final risk score. Higher weight = more influence on whether a change passes or fails.</div>
    ${cfgSlider('signal_weights', 'static_analysis', sw.static_analysis || 1.0, 'Static Analysis', {min: 0.1, max: 10, step: 0.1, hint: 'Linting via ruff. Increase to fail more aggressively on code style / lint issues.'})}
    ${cfgSlider('signal_weights', 'behavioral_diff', sw.behavioral_diff || 1.5, 'Behavioral Diff', {min: 0.1, max: 10, step: 0.1, hint: 'Test output comparison before/after. High weight catches regressions; low weight tolerates test flakiness.'})}
    ${cfgSlider('signal_weights', 'intent_alignment', sw.intent_alignment || 1.2, 'Intent Alignment', {min: 0.1, max: 10, step: 0.1, hint: 'LLM check that code matches declared intent. Increase to penalize agents that drift from their stated plan.'})}
    ${cfgSlider('signal_weights', 'resource_bounds', sw.resource_bounds || 1.0, 'Resource Bounds', {min: 0.1, max: 10, step: 0.1, hint: 'File size and resource checks. Increase to block agents adding large files or bloated output.'})}
    ${cfgSlider('signal_weights', 'security_scan', sw.security_scan || 2.0, 'Security Scan', {min: 0.1, max: 10, step: 0.1, hint: 'Bandit security scanning. Already 2x by default. Reduce only if security false positives are blocking too many deploys.'})}
  `);
}

function renderRiskFactorWeightsSection(rfw) {
  return cfgSectionCard('Risk Factor Weights', 'risk_factor_weights', `
    <div style="grid-column:1/-1;margin-bottom:0.25rem" class="config-hint">These weights determine how the overall risk score is computed. They should sum to 1.0 for balanced scoring.</div>
    ${cfgSlider('risk_factor_weights', 'file_sensitivity', rfw.file_sensitivity || 0.25, 'File Sensitivity', {hint: 'How much touching sensitive files (auth, config, infra) raises risk. Increase to be stricter about critical paths.'})}
    ${cfgSlider('risk_factor_weights', 'blast_radius', rfw.blast_radius || 0.20, 'Blast Radius', {hint: 'How much the number of files/lines changed raises risk. Increase to penalize large changes more.'})}
    ${cfgSlider('risk_factor_weights', 'agent_trust', rfw.agent_trust || 0.20, 'Agent Trust', {hint: 'How much agent reputation lowers risk. Increase to give trusted agents more freedom; decrease to treat all agents equally.'})}
    ${cfgSlider('risk_factor_weights', 'validation_confidence', rfw.validation_confidence || 0.20, 'Validation Confidence', {hint: 'How much passing validation signals lower risk. Increase to reward clean validation results more.'})}
    ${cfgSlider('risk_factor_weights', 'time_of_day', rfw.time_of_day || 0.15, 'Time of Day', {hint: 'Risk bump for deploys outside business hours. Reduce to 0 if you deploy 24/7 and don\'t care about timing.'})}
  `);
}

function renderDeployRoutesSection(dr) {
  const routeOptions = ['auto_deploy', 'agent_review', 'human_approval', 'human_approval_canary'];
  return cfgSectionCard('Deploy Routes', 'deploy_routes', `
    <div style="grid-column:1/-1;margin-bottom:0.25rem" class="config-hint">Maps each risk level to a deployment strategy. auto_deploy = no review, agent_review = another agent checks, human_approval = you decide, human_approval_canary = you decide + gradual rollout.</div>
    ${cfgSelect('deploy_routes', 'low', dr.low || 'auto_deploy', 'Low Risk', routeOptions, {hint: 'Trivial changes (docs, formatting). Set to agent_review if you want a second pair of eyes on everything.'})}
    ${cfgSelect('deploy_routes', 'medium', dr.medium || 'agent_review', 'Medium Risk', routeOptions, {hint: 'Standard feature work. Set to human_approval if you want to personally approve most code changes.'})}
    ${cfgSelect('deploy_routes', 'high', dr.high || 'human_approval', 'High Risk', routeOptions, {hint: 'Risky changes (auth, infra, multi-service). Lowering this removes your safety net for dangerous deploys.'})}
    ${cfgSelect('deploy_routes', 'critical', dr.critical || 'human_approval_canary', 'Critical Risk', routeOptions, {hint: 'Highest-risk changes. Canary deploys roll out gradually so you can catch issues before full release.'})}
  `);
}

function renderTrustSection(t) {
  const weights = t.weights || {};
  return cfgSectionCard('Trust', 'trust', `
    ${cfgSlider('trust', 'baseline_trust', t.baseline_trust || 0.5, 'Baseline Trust', {hint: 'Starting trust for new agents. Higher = new agents deploy with less scrutiny. Lower = new agents face tighter review until they prove themselves.'})}
    ${cfgNumberInput('trust', 'tenure_ramp_deployments', t.tenure_ramp_deployments || 100, 'Tenure Ramp Deployments', {min: 1, max: 1000, hint: 'Deploys needed to earn full tenure bonus. Lower = agents earn trust faster. Higher = slower trust ramp.'})}

function renderConstraintsEditorSection(cst) {
  const constraints = (cst && cst.constraints) || [];
  if (constraints.length === 0) return '';
  const severityOptions = ['must', 'should', 'prefer'];
  const severityColor = s => ({must: 'var(--red, #ef4444)', should: 'var(--yellow, #f59e0b)', prefer: 'var(--blue, #3b82f6)'}[s] || 'var(--text-secondary)');
  const rows = constraints.map((c, i) => `
    <tr>
      <td style="vertical-align:top"><code style="color:var(--blue);white-space:nowrap">${escapeHtml(c.constraint_id || '')}</code></td>
      <td style="vertical-align:top"><span class="badge badge-blue">${escapeHtml(c.category || '')}</span></td>
      <td style="vertical-align:top">
        <select class="config-input config-input-sm" data-constraint-idx="${i}" data-cfield="severity">
          ${severityOptions.map(s => `<option value="${s}" ${s === (c.severity || '').toLowerCase() ? 'selected' : ''}>${s.toUpperCase()}</option>`).join('')}
        </select>
      </td>
      <td>
        <input type="text" class="config-input" data-constraint-idx="${i}" data-cfield="rule" value="${escapeHtml(c.rule || '')}" style="width:100%;font-weight:500;font-size:0.85rem">
        ${c.rationale ? `<div class="config-hint" style="margin-top:0.3rem">${escapeHtml(c.rationale.trim())}</div>` : ''}
      </td>
    </tr>
  `).join('');

  return `
    <div class="card" style="margin-bottom:1rem">
      <div class="card-body">
        <h3 style="margin-bottom:0.5rem;color:var(--text-primary);font-size:1.1rem">Constraints</h3>
        <div class="config-hint" style="margin-bottom:1rem">Rules agents must follow. MUST = blocks deploy, SHOULD = warning, PREFER = suggestion only.</div>
        <div style="overflow-x:auto">
          <table class="data-table" id="cfg-constraints-table">
            <thead><tr><th style="width:140px">ID</th><th style="width:110px">Category</th><th style="width:100px">Severity</th><th>Rule</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function collectConfigFromUI() {
  // Build the config object from all inputs
  const cfg = JSON.parse(JSON.stringify(_configData));
  const editor = document.getElementById('config-editor');

  // Collect regular inputs
  editor.querySelectorAll('input[data-section][data-key], select[data-section][data-key]').forEach(el => {
    const section = el.dataset.section;
    const key = el.dataset.key;
    let value;
    if (el.type === 'checkbox') {
      value = el.checked;
    } else if (el.type === 'number' || el.type === 'range') {
      value = parseFloat(el.value);
    } else {
      value = el.value;
    }

    // Handle nested sections like 'trust.weights' or 'sandbox.resource_limits'
    const parts = section.split('.');
    let target = cfg;
    for (const p of parts) {
      if (!target[p]) target[p] = {};
      target = target[p];
    }
    target[key] = value;
  });

  return cfg;
}

function collectConstraintsFromUI() {
  const data = JSON.parse(JSON.stringify(_constraintsData));
  const table = document.getElementById('cfg-constraints-table');
  if (!table) return data;

  table.querySelectorAll('[data-constraint-idx]').forEach(el => {
    const idx = parseInt(el.dataset.constraintIdx, 10);
    const field = el.dataset.cfield;
    if (data.constraints[idx] && field) {
      data.constraints[idx][field] = el.value;
    }
  });
  return data;
}

function configValidateUI() {
  // Basic client-side validation — highlight invalid fields
  const errors = [];
  const editor = document.getElementById('config-editor');

  editor.querySelectorAll('input[type="number"], input[type="range"]').forEach(el => {
    const min = el.min !== '' ? parseFloat(el.min) : -Infinity;
    const max = el.max !== '' ? parseFloat(el.max) : Infinity;
    const val = parseFloat(el.value);
    if (isNaN(val) || val < min || val > max) {
      el.style.borderColor = 'var(--red)';
      errors.push(`${el.dataset.section}.${el.dataset.key}: value out of range`);
    } else {
      el.style.borderColor = '';
    }
  });

  return errors;
}

async function configSave() {
  const errors = configValidateUI();
  if (errors.length > 0) {
    toast('Fix validation errors before saving', 'error');
    return;
  }

  const saveBtn = document.getElementById('config-save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';

  try {
    const cfg = collectConfigFromUI();
    const cst = collectConstraintsFromUI();
    await Promise.all([
      api.put('/config', cfg),
      api.put('/config/constraints', cst),
    ]);
    _configData = cfg;
    _constraintsData = cst;
    toast('Configuration saved successfully', 'success');
  } catch (e) {
    toast('Save failed: ' + e.message, 'error');
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Changes';
  }
}

async function configReset() {
  await loadConfigEditor();
  toast('Configuration reloaded from server', 'info');
}

async function loadProjectsList() {
  // All dynamic text escaped via escapeHtml() to prevent XSS
  const container = document.getElementById('projects-container');
  try {
    const projects = await api.get('/projects');
    if (!projects || projects.length === 0) {
      container.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">&#9744;</div><div class="empty-state-text">No projects yet. Create one to get started.</div></div>';
      return;
    }
    container.innerHTML = projects.map(p => {
      const milestones = p.milestones || [];
      const completedMs = milestones.filter(m => m.status === 'completed' || m.status === 'done').length;
      const totalMs = milestones.length;
      const progressPct = totalMs > 0 ? (completedMs / totalMs * 100) : 0;
      const projectStatus = p.status || 'draft';
      return `
        <div class="project-card" onclick="showProjectDetail('${escapeHtml(p.project_id || p.id)}')">
          <div class="project-card-header">
            <div class="project-title">${escapeHtml(p.title || p.name || 'Untitled')}</div>
            ${statusBadge(projectStatus)}
          </div>
          <div class="project-desc">${escapeHtml(p.description || 'No description')}</div>
          ${totalMs > 0 ? `
            <div class="project-progress">
              <div class="progress-bar">
                <div class="progress-fill" style="width:${progressPct}%;background:${progressPct >= 100 ? 'var(--green)' : 'var(--blue)'}"></div>
              </div>
              <span>${completedMs}/${totalMs}</span>
            </div>
          ` : ''}
          <div class="project-meta">
            ${p.priority ? `<span>${priorityBadge(p.priority)}</span>` : ''}
            ${p.created_at ? `<span>${formatDate(p.created_at)}</span>` : ''}
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-text">Error: ${escapeHtml(e.message)}</div></div>`;
  }
}

async function deleteProject(projectId) {
  if (!confirm('Delete this project? This cannot be undone.')) return;
  try {
    const r = await fetch(`/api/projects/${projectId}`, { method: 'DELETE' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }
    closeModal();
    toast('Project deleted', 'success');
    await loadProjectsList();
  } catch (e) {
    toast(`Failed to delete: ${e.message}`, 'error');
  }
}

async function activateProject(projectId) {
  if (!confirm('Activate this project? This will create goals, decompose tasks, and make them available for agents to claim.')) return;
  try {
    await api.post(`/projects/${projectId}/activate`);
    closeModal();
    toast('Project activated', 'success');
    await loadProjectsList();
  } catch (e) {
    toast(`Failed to activate project: ${e.message}`, 'error');
  }
}

async function pauseProject(projectId) {
  if (!confirm('Pause this project? Agents will not see its tasks.')) return;
  try {
    await api.post('/projects/' + projectId + '/pause');
    toast('Project paused', 'success');
    await showProjectDetail(projectId);
    loadProjectsList();
  } catch (e) {
    toast('Failed to pause project: ' + e.message, 'error');
  }
}

async function resumeProject(projectId) {
  try {
    await api.post('/projects/' + projectId + '/resume');
    toast('Project resumed', 'success');

// ===== Activity Tab — Mission Control =====
let activityEvents = [];
let activityFilter = 'all';
let pulseCanvas = null;
let pulseCtx = null;
let pulseData = [];
let pulseAnimFrame = null;

const EVENT_TYPE_CONFIG = {
  'pipeline.started':   { icon: '&#9654;', color: 'blue',   label: 'Pipeline Started',   category: 'pipeline' },
  'pipeline.passed':    { icon: '&#10003;', color: 'green',  label: 'Pipeline Passed',    category: 'pipeline' },
  'pipeline.failed':    { icon: '&#10007;', color: 'red',    label: 'Pipeline Failed',    category: 'pipeline' },
  'approval.needed':    { icon: '&#9888;', color: 'amber',  label: 'Approval Needed',    category: 'approval' },
  'approval.granted':   { icon: '&#10003;', color: 'green',  label: 'Approval Granted',   category: 'approval' },
  'approval.rejected':  { icon: '&#10007;', color: 'red',    label: 'Approval Rejected',  category: 'approval' },
  'goal.created':       { icon: '&#9733;', color: 'purple', label: 'Goal Created',       category: 'goal' },
  'goal.activated':     { icon: '&#9654;', color: 'blue',   label: 'Goal Activated',     category: 'goal' },
  'goal.completed':     { icon: '&#10003;', color: 'green',  label: 'Goal Completed',     category: 'goal' },
  'agent.registered':   { icon: '&#9881;', color: 'blue',   label: 'Agent Registered',   category: 'agent' },
  'deploy.started':     { icon: '&#9650;', color: 'blue',   label: 'Deploy Started',     category: 'deploy' },
  'deploy.completed':   { icon: '&#10003;', color: 'green',  label: 'Deploy Completed',   category: 'deploy' },
  'task.routed':        { icon: '&#10132;', color: 'blue',   label: 'Task Routed',        category: 'routing' },
  'routing.fallback':   { icon: '&#9888;', color: 'amber',  label: 'Routing Fallback',   category: 'routing' },
  'anomaly.detected':   { icon: '&#9888;', color: 'red',    label: 'Anomaly Detected',   category: 'alert' },
};

function getEventConfig(eventType) {
  return EVENT_TYPE_CONFIG[eventType] || { icon: '&#9679;', color: 'blue', label: eventType || 'Event', category: 'other' };
}

function eventCardClass(eventType) {
  const cfg = getEventConfig(eventType);
  if (cfg.color === 'green') return 'event-success';
  if (cfg.color === 'red') return 'event-failure';
  if (cfg.color === 'amber') return 'event-warning';
  if (cfg.color === 'purple') return 'event-new';
  return 'event-info';
}

function relativeTime(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  if (isNaN(d.getTime())) return isoStr;
  const diffSec = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diffSec < 5) return 'just now';
  if (diffSec < 60) return diffSec + 's ago';
  const diffMin = Math.floor(diffSec / 60);
  if (diffMin < 60) return diffMin + 'm ago';
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return diffHr + 'h ago';
  return Math.floor(diffHr / 24) + 'd ago';
}

function renderEventCard(ev) {
  const cfg = getEventConfig(ev.event_type);
  const desc = ev.description || '';
  const agentId = ev.agent_id ? truncateId(ev.agent_id) : null;
  const meta = ev.metadata || {};
  const metaParts = [];
  if (agentId) metaParts.push(`<span class="mono" title="${escapeHtml(ev.agent_id || '')}">Agent ${escapeHtml(agentId)}</span>`);
  if (meta.run_id) metaParts.push(`<span class="mono">Run ${escapeHtml(truncateId(meta.run_id))}</span>`);
  if (meta.goal_id) metaParts.push(`<span class="mono">Goal ${escapeHtml(truncateId(meta.goal_id))}</span>`);
  if (meta.stage) metaParts.push(`<span>${escapeHtml(meta.stage)}</span>`);

  return `<div class="event-card ${eventCardClass(ev.event_type)}">
    <div class="event-icon ${cfg.color}">${cfg.icon}</div>
    <div class="event-body">
      <div class="event-title">${escapeHtml(cfg.label)}</div>
      ${desc ? `<div class="event-desc">${escapeHtml(desc)}</div>` : ''}
      ${metaParts.length > 0 ? `<div class="event-meta">${metaParts.join('<span style="color:var(--border)">|</span>')}</div>` : ''}
    </div>
    <div class="event-timestamp" data-ts="${escapeHtml(ev.timestamp || '')}">${relativeTime(ev.timestamp)}</div>
  </div>`;
}

function filteredEvents() {
  if (activityFilter === 'all') return activityEvents;
  return activityEvents.filter(ev => {
    const cfg = getEventConfig(ev.event_type);
    return cfg.category === activityFilter;
  });
}

function renderEventStream() {
  const container = document.getElementById('event-stream');
  if (!container) return;
  const events = filteredEvents();
  const countEl = document.getElementById('activity-event-count');
  if (countEl) countEl.textContent = events.length + ' events';
  if (events.length === 0) {
    container.innerHTML = `<div class="empty-state" style="padding:2rem">
      <div class="empty-state-icon" style="font-size:1.5rem">&#9473;</div>
      <div class="empty-state-text">No activity events yet. Events will appear here as agents work.</div>
    </div>`;
    return;
  }
  // Show newest first
  const reversed = [...events].reverse();
  container.innerHTML = reversed.map(renderEventCard).join('');
}

function setActivityFilter(filter) {
  activityFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.filter === filter);
  });
  renderEventStream();
}

function updateActivityTimestamps() {
  document.querySelectorAll('.event-timestamp[data-ts]').forEach(el => {
    const ts = el.getAttribute('data-ts');
    if (ts) el.textContent = relativeTime(ts);
  });
}

// System pulse heartbeat canvas
function initPulseCanvas() {
  pulseCanvas = document.getElementById('pulse-canvas');
  if (!pulseCanvas) return;
  pulseCtx = pulseCanvas.getContext('2d');
  pulseData = [];
  drawPulse();
}

function addPulsePoint(type) {
  const height = type === 'success' ? 0.8 : type === 'failure' ? 1.0 : type === 'warning' ? 0.6 : 0.3;
  const color = type === 'success' ? '#22c55e' : type === 'failure' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#3b82f6';
  pulseData.push({ height, color, x: Date.now() });
  if (pulseData.length > 200) pulseData.shift();
}

function drawPulse() {
  if (!pulseCanvas || !pulseCtx) return;
  const w = pulseCanvas.width = pulseCanvas.offsetWidth * 2;
  const h = pulseCanvas.height = pulseCanvas.offsetHeight * 2;
  pulseCtx.clearRect(0, 0, w, h);

  if (pulseData.length < 2) {
    // Draw flat line
    pulseCtx.strokeStyle = '#334155';
    pulseCtx.lineWidth = 2;
    pulseCtx.beginPath();
    pulseCtx.moveTo(0, h / 2);
    pulseCtx.lineTo(w, h / 2);
    pulseCtx.stroke();
    pulseAnimFrame = requestAnimationFrame(drawPulse);
    return;
  }

  const now = Date.now();
  const windowMs = 60000; // 60 second window
  pulseCtx.lineWidth = 2;

  // Draw baseline
  pulseCtx.strokeStyle = '#1e293b';
  pulseCtx.beginPath();
  pulseCtx.moveTo(0, h / 2);
  pulseCtx.lineTo(w, h / 2);
  pulseCtx.stroke();

  // Draw pulse points
  for (const point of pulseData) {
    const age = now - point.x;
    if (age > windowMs) continue;
    const x = w - (age / windowMs) * w;
    const peakH = point.height * (h / 2 - 4);
    const alpha = Math.max(0.2, 1 - age / windowMs);

    pulseCtx.strokeStyle = point.color;
    pulseCtx.globalAlpha = alpha;
    pulseCtx.lineWidth = 2;
    pulseCtx.beginPath();

    // Draw spike
    const spikeWidth = 12;
    pulseCtx.moveTo(x - spikeWidth, h / 2);
    pulseCtx.lineTo(x - spikeWidth / 3, h / 2 + peakH * 0.3);
    pulseCtx.lineTo(x, h / 2 - peakH);
    pulseCtx.lineTo(x + spikeWidth / 3, h / 2 + peakH * 0.2);
    pulseCtx.lineTo(x + spikeWidth, h / 2);
    pulseCtx.stroke();
  }
  pulseCtx.globalAlpha = 1;

  pulseAnimFrame = requestAnimationFrame(drawPulse);
}

function stopPulse() {
  if (pulseAnimFrame) {
    cancelAnimationFrame(pulseAnimFrame);
    pulseAnimFrame = null;
  }
}

async function renderAgentLanes() {
  const container = document.getElementById('agent-lanes');
  if (!container) return;
  try {
    const agents = await api.get('/agents');
    if (!agents || agents.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:1rem;color:var(--text-muted);font-size:0.85rem">No agents registered</div>`;
      return;
    }
    const stages = ['INTENT', 'SANDBOX', 'VALIDATE', 'TRUST', 'DEPLOY'];
    const avatarColors = ['blue', 'green', 'purple', 'amber', 'red'];
    container.innerHTML = agents.slice(0, 8).map((agent, idx) => {
      const name = agent.name || agent.agent_id?.substring(0, 8) || 'Agent';
      const initial = name.charAt(0).toUpperCase();
      const colorVar = avatarColors[idx % avatarColors.length];
      const status = (agent.status || 'idle').toLowerCase();
      const statusCls = status === 'active' || status === 'working' ? 'working' :
                        status === 'waiting' ? 'waiting' :
                        status === 'error' ? 'error' : 'idle';
      // Find the agent's current pipeline stage from recent events
      const agentEvents = activityEvents.filter(e => e.agent_id === agent.agent_id);
      const latestPipeline = agentEvents.find(e => e.event_type?.startsWith('pipeline.'));
      let activeStageIdx = -1;
      let stageFailed = false;
      if (latestPipeline) {
        const meta = latestPipeline.metadata || {};
        const stageMap = { 'intent': 0, 'sandbox': 1, 'validation': 2, 'validate': 2, 'trust_routing': 3, 'trust': 3, 'deploy': 4 };
        activeStageIdx = stageMap[(meta.stage || '').toLowerCase()] ?? -1;
        stageFailed = latestPipeline.event_type === 'pipeline.failed';
      }
      const stagesHtml = stages.map((s, si) => {
        let cls = 'idle';
        if (activeStageIdx >= 0) {
          if (si < activeStageIdx) cls = 'done';
          else if (si === activeStageIdx) cls = stageFailed ? 'fail' : 'active';
        }
        return `<div class="lane-stage ${cls}">${s}</div>`;
      }).join('');

      return `<div class="agent-lane">
        <div class="agent-lane-avatar" style="background:var(--${colorVar}-dim);color:var(--${colorVar})">${escapeHtml(initial)}</div>
        <div class="agent-lane-name">${escapeHtml(name)}</div>
        <div class="agent-lane-pipeline">${stagesHtml}</div>
        <div class="agent-lane-status ${statusCls}">${escapeHtml(statusCls)}</div>
      </div>`;
    }).join('');
  } catch (e) {
    container.innerHTML = `<div style="text-align:center;padding:1rem;color:var(--text-muted);font-size:0.85rem">Could not load agents</div>`;
  }
}

async function loadActivityData() {
  const container = document.getElementById('activity-content');
  if (!container) return;
  try {
    const [agents, runs, goals, events] = await Promise.all([
      api.get('/agents'),
      api.get('/runs'),
      api.get('/goals'),
      fetch('/api/activity?limit=30').then(r => r.ok ? r.json() : []),
    ]);

    // --- Agents overview ---
    const agentCards = (agents || []).map(a => {
      const trust = (a.trust_score * 100).toFixed(0);
      const trustColor = trust >= 70 ? 'var(--green)' : trust >= 30 ? 'var(--yellow)' : 'var(--red)';
      const agentRuns = (runs || []).filter(r => r.agent_id === a.agent_id);
      const lastRun = agentRuns.length > 0 ? agentRuns[agentRuns.length - 1] : null;
      const lastStatus = lastRun ? lastRun.status : 'idle';
      const statusDot = lastStatus === 'running' ? 'var(--blue)' :
                        lastStatus === 'blocked' ? 'var(--yellow)' :
                        lastStatus === 'passed' ? 'var(--green)' :
                        lastStatus === 'failed' ? 'var(--red)' : 'var(--text-muted)';
      return `<div style="background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:8px;padding:0.75rem;min-width:180px">
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem">
          <div style="width:8px;height:8px;border-radius:50%;background:${statusDot}"></div>
          <strong style="font-size:0.9rem">${escapeHtml(a.agent_id)}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text-muted)">
          <span>Trust: <span style="color:${trustColor};font-weight:600">${trust}%</span></span>
          <span>${a.successful_deployments}/${a.total_deployments} runs</span>
        </div>
        ${lastRun ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.35rem">Last: ${statusBadge(lastStatus)} ${relativeTime(lastRun.started_at || lastRun.created_at)}</div>` : ''}
      </div>`;
    }).join('');

    // --- Active/blocked runs ---
    const activeRuns = (runs || []).filter(r => r.status === 'running' || r.status === 'blocked');
    const activeRunsHtml = activeRuns.length > 0 ? activeRuns.map(r => {
      const isBlocked = r.status === 'blocked';
      return `<div style="display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.75rem;background:${isBlocked ? 'rgba(245,158,11,0.08)' : 'rgba(59,130,246,0.08)'};border:1px solid ${isBlocked ? 'var(--yellow)' : 'var(--blue)'};border-radius:8px;margin-bottom:0.5rem">
        <div style="font-size:1.2rem">${isBlocked ? '&#9888;' : '&#9654;'}</div>
        <div style="flex:1">
          <div style="font-weight:500;font-size:0.9rem">${escapeHtml(r.agent_id)}</div>
          <div style="font-size:0.8rem;color:var(--text-muted)">Stage: ${escapeHtml(r.current_stage || '---')} ${statusBadge(r.status)}</div>
        </div>
        ${isBlocked ? `<div style="display:flex;gap:0.35rem">
          <button class="btn btn-sm btn-success" onclick="showApproveDialog('${r.run_id}')">Approve</button>
          <button class="btn btn-sm btn-danger" onclick="showRejectDialog('${r.run_id}')">Reject</button>
        </div>` : `<div class="spinner" style="width:16px;height:16px"></div>`}
      </div>`;
    }).join('') : '<div style="color:var(--text-muted);font-size:0.85rem;padding:0.5rem">No active runs</div>';

    // --- Recent completed runs ---
    const recentRuns = (runs || [])
      .filter(r => r.status !== 'running' && r.status !== 'blocked')
      .sort((a, b) => (b.started_at || '').localeCompare(a.started_at || ''))
      .slice(0, 10);
    const recentRunsHtml = recentRuns.map(r => {
      const icon = r.status === 'passed' ? '&#10003;' : r.status === 'failed' ? '&#10007;' : '&#9679;';
      const color = r.status === 'passed' ? 'var(--green)' : r.status === 'failed' ? 'var(--red)' : 'var(--text-muted)';
      return `<div style="display:flex;align-items:center;gap:0.6rem;padding:0.4rem 0;border-bottom:1px solid var(--border-subtle);font-size:0.85rem">
        <span style="color:${color};font-size:1rem;width:1.2rem;text-align:center">${icon}</span>
        <span style="flex:1;font-weight:500">${escapeHtml(r.agent_id)}</span>
        ${statusBadge(r.status)}
        <span style="color:var(--text-muted);font-size:0.8rem">${relativeTime(r.started_at || r.created_at)}</span>
      </div>`;
    }).join('') || '<div style="color:var(--text-muted);font-size:0.85rem">No runs yet</div>';

    // --- Event timeline ---
    const timelineHtml = (events || []).reverse().map(ev => {
      const cfg = getEventConfig(ev.event_type);
      const meta = ev.metadata || {};
      let desc = cfg.label;
      if (meta.title) desc += `: ${meta.title}`;
      if (ev.agent_id) desc += ` (${ev.agent_id})`;
      const color = cfg.color === 'green' ? 'var(--green)' : cfg.color === 'red' ? 'var(--red)' :
                    cfg.color === 'amber' ? 'var(--yellow)' : cfg.color === 'purple' ? 'var(--blue)' : 'var(--text-muted)';
      return `<div style="display:flex;align-items:flex-start;gap:0.6rem;padding:0.35rem 0;font-size:0.85rem">
        <span style="color:${color};margin-top:0.1rem">${cfg.icon}</span>
        <span style="flex:1">${escapeHtml(desc)}</span>
        <span style="color:var(--text-muted);font-size:0.75rem;white-space:nowrap">${relativeTime(ev.timestamp)}</span>
      </div>`;
    }).join('') || '<div style="color:var(--text-muted)">No events yet</div>';

    // --- Tasks waiting ---
    const pendingTasks = [];
    for (const g of (goals || [])) {
      if (g.status !== 'active' && g.status !== 'in_progress') continue;
      try {
        const detail = await api.get(`/goals/${g.goal_id}`);
        for (const t of (detail.tasks || [])) {
          if (t.status === 'pending') pendingTasks.push(t);
        }
      } catch(e) {}
    }
    const tasksHtml = pendingTasks.length > 0
      ? pendingTasks.map(t => `<div style="display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0;border-bottom:1px solid var(--border-subtle);font-size:0.85rem">
          <span style="color:var(--yellow)">&#9679;</span>
          <span style="flex:1">${escapeHtml(t.title)}</span>
          ${statusBadge('pending')}
        </div>`).join('')
      : '<div style="color:var(--text-muted);font-size:0.85rem">No pending tasks — all work assigned</div>';

    container.innerHTML = `
      <div style="display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.5rem">${agentCards}</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
        <div class="card">
          <div class="card-header"><span class="card-title">Active Runs</span></div>
          <div class="card-body" style="padding:0.75rem">${activeRunsHtml}</div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">Pending Tasks</span></div>
          <div class="card-body" style="padding:0.75rem">${tasksHtml}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="card">
          <div class="card-header"><span class="card-title">Recent Runs</span></div>
          <div class="card-body" style="padding:0.75rem">${recentRunsHtml}</div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">Event Timeline</span></div>
          <div class="card-body" style="padding:0.75rem;max-height:300px;overflow-y:auto">${timelineHtml}</div>
        </div>
      </div>
    `;
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-text">Error loading activity: ${escapeHtml(e.message)}</div></div>`;
  }
}

function clearActivityEvents() {
  activityEvents = [];
  pulseData = [];
  renderEventStream();
}

function pushActivityEvent(ev) {
  activityEvents.push(ev);
  // Keep at most 200 events in memory
  if (activityEvents.length > 200) activityEvents.shift();

  // Add pulse point
  const cfg = getEventConfig(ev.event_type);
  const pType = cfg.color === 'green' ? 'success' : cfg.color === 'red' ? 'failure' : cfg.color === 'amber' ? 'warning' : 'info';
  addPulsePoint(pType);

  // If activity tab is visible, update the stream
  if (currentPage === 'activity') {
    renderEventStream();
    renderAgentLanes();
  }
}

// ===== Navigation helpers =====
function navigateToGoal(goalId) {
  navigate('goals');
  // Wait for goals tab to render, then expand the matching goal row
  setTimeout(() => {
    const row = document.querySelector(`tr[data-goal-id="${goalId}"]`);
    if (row) {
      row.click();
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 500);
}

function showAddGoalToMilestone(projectId, milestoneId) {
  // All user-supplied IDs are UUIDs from our own API, escaped for safety
  const safeProjectId = escapeHtml(projectId);
  const safeMilestoneId = escapeHtml(milestoneId);
  const modalEl = document.getElementById('modal-content');
  // Build modal using DOM methods with textContent for labels
  modalEl.textContent = '';
  const header = document.createElement('div');
  header.className = 'modal-header';
  const titleSpan = document.createElement('span');
  titleSpan.className = 'modal-title';
  titleSpan.textContent = 'Add Goal to Milestone';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.textContent = '\u00D7';
  closeBtn.onclick = closeModal;
  header.appendChild(titleSpan);
  header.appendChild(closeBtn);
  modalEl.appendChild(header);

  const body = document.createElement('div');
  body.className = 'modal-body';
  body.innerHTML = [
    '<div class="form-group"><label class="form-label">Title</label>',
    '<input class="form-input" id="ms-goal-title" placeholder="e.g. Build API endpoints" autofocus></div>',
    '<div class="form-group"><label class="form-label">Description</label>',
    '<textarea class="form-textarea" id="ms-goal-desc" placeholder="Describe what this goal achieves..."></textarea></div>',
    '<div class="form-group"><label class="form-label">Priority</label>',
    '<select class="form-select" id="ms-goal-priority">',
    '<option value="low">Low</option><option value="medium" selected>Medium</option>',
    '<option value="high">High</option><option value="critical">Critical</option>',
    '</select></div>',
  ].join('');
  modalEl.appendChild(body);

  const footer = document.createElement('div');
  footer.className = 'modal-footer';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-ghost';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = closeModal;
  const submitBtn = document.createElement('button');
  submitBtn.className = 'btn btn-primary';
  submitBtn.textContent = 'Create & Link';
  submitBtn.onclick = () => submitGoalToMilestone(safeProjectId, safeMilestoneId);
  footer.appendChild(cancelBtn);
  footer.appendChild(submitBtn);
  modalEl.appendChild(footer);
  setTimeout(() => document.getElementById('ms-goal-title')?.focus(), 100);
}

async function submitGoalToMilestone(projectId, milestoneId) {
  const title = document.getElementById('ms-goal-title').value.trim();
  const description = document.getElementById('ms-goal-desc').value.trim();
  const priority = document.getElementById('ms-goal-priority').value;
  if (!title) { toast('Title is required', 'error'); return; }
  try {
    await api.post(
      '/projects/' + encodeURIComponent(projectId) + '/milestones/' + encodeURIComponent(milestoneId) + '/goals',
      { title, description: description || title, priority }
    );
    closeModal();
    toast('Goal created and linked to milestone', 'success');
    await loadProjectsList();
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

// ===== WebSocket =====
function connectWebSocket() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  try {
    wsConnection = new WebSocket(`${protocol}//${location.host}/api/ws`);
    wsConnection.onopen = () => {
      document.getElementById('connection-dot').style.background = 'var(--green)';
      document.getElementById('connection-label').textContent = 'Connected';
    };
    wsConnection.onclose = () => {
      document.getElementById('connection-dot').style.background = 'var(--red)';
      document.getElementById('connection-label').textContent = 'Disconnected';
      // Reconnect after 3 seconds
      setTimeout(connectWebSocket, 3000);
    };
    wsConnection.onerror = () => {
      document.getElementById('connection-dot').style.background = 'var(--amber)';
      document.getElementById('connection-label').textContent = 'Reconnecting...';
    };
    wsConnection.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        handleWsMessage(msg);
      } catch (e) { /* ignore parse errors */ }
    };
  } catch (e) {
    // WebSocket not available — rely on polling only
    document.getElementById('connection-dot').style.background = 'var(--amber)';
    document.getElementById('connection-label').textContent = 'Polling';
  }
}

function handleWsMessage(msg) {
  const type = msg.type || msg.event;

  // Activity feed events from the dispatcher
  if (type === 'activity' && msg.event_type) {
    pushActivityEvent(msg);
  }

  if (type === 'pipeline_update' || type === 'run_update') {
    if (currentPage === 'dashboard') renderDashboard();
    if (currentPage === 'pipeline') loadPipelineTable();
  } else if (type === 'goal_update') {
    if (currentPage === 'goals') loadGoalsTable();
    if (currentPage === 'dashboard') renderDashboard();
  } else if (type === 'approval_needed') {
    toast('New run requires approval', 'info');
    if (currentPage === 'dashboard') renderDashboard();
    if (currentPage === 'pipeline') loadPipelineTable();
  } else if (type === 'project_update') {
    if (currentPage === 'projects') loadProjectsList();
  }

  // Agent status live updates (Phase 2)
  if (msg.event_type === 'agent.status_updated') {
    if (currentPage === 'dashboard') loadAgentStatusPanel();
    if (currentPage === 'agents') renderAgents();
    if (currentPage === 'activity') loadActivityData();
  }
  if (msg.event_type === 'lease.expired') {
    toast('Lease expired — task reset to pending', 'warning');
    if (currentPage === 'dashboard') renderDashboard();
  }
}

// ===== Init =====
const _initPage = location.hash.replace(/^#\/?/, '') || 'dashboard';
navigate(pages[_initPage] ? _initPage : 'dashboard');
connectWebSocket();
</script>
