<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipyard Command Center</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-card: #1e293b;
  --bg-hover: #334155;
  --bg-input: #0f172a;
  --border: #334155;
  --border-subtle: #1e293b;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --green: #22c55e;
  --green-dim: rgba(34, 197, 94, 0.15);
  --amber: #f59e0b;
  --amber-dim: rgba(245, 158, 11, 0.15);
  --red: #ef4444;
  --red-dim: rgba(239, 68, 68, 0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59, 130, 246, 0.15);
  --purple: #a855f7;
  --purple-dim: rgba(168, 85, 247, 0.15);
  --gray: #64748b;
  --gray-dim: rgba(100, 116, 139, 0.15);
  --radius: 8px;
  --radius-sm: 4px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg: 0 4px 6px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.2);
  --transition: 150ms ease;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

html { font-size: 14px; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== Layout ===== */
.app-header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  height: 56px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  margin-right: 2rem;
  flex-shrink: 0;
}
.logo svg { width: 28px; height: 28px; }
.logo-dot { color: var(--green); }

nav {
  display: flex;
  gap: 0.25rem;
  overflow-x: auto;
  flex: 1;
}
nav button {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 0.5rem 1rem;
  font-size: 0.875rem;
  font-family: var(--font-sans);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
  white-space: nowrap;
  position: relative;
}
nav button:hover { color: var(--text-primary); background: var(--bg-hover); }
nav button.active {
  color: var(--text-primary);
  background: var(--bg-hover);
}
nav button.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0.5rem;
  right: 0.5rem;
  height: 2px;
  background: var(--blue);
  border-radius: 1px;
}

.header-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.8rem;
  color: var(--text-muted);
  flex-shrink: 0;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

main {
  flex: 1;
  padding: 1.5rem;
  max-width: 1400px;
  width: 100%;
  margin: 0 auto;
}

/* ===== Metric Cards ===== */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.metric-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  transition: border-color var(--transition), transform var(--transition);
  position: relative;
  overflow: hidden;
}
.metric-card:hover { border-color: var(--text-muted); transform: translateY(-1px); }
.metric-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.metric-card.green::before { background: var(--green); }
.metric-card.amber::before { background: var(--amber); }
.metric-card.red::before { background: var(--red); }
.metric-card.blue::before { background: var(--blue); }

.metric-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
}
.metric-icon.green { background: var(--green-dim); color: var(--green); }
.metric-icon.amber { background: var(--amber-dim); color: var(--amber); }
.metric-icon.red { background: var(--red-dim); color: var(--red); }
.metric-icon.blue { background: var(--blue-dim); color: var(--blue); }

.metric-value {
  font-size: 2rem;
  font-weight: 700;
  font-family: var(--font-mono);
  line-height: 1;
}
.metric-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ===== Tables ===== */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}
.data-table th {
  text-align: left;
  padding: 0.75rem 1rem;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
.data-table td {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: middle;
}
.data-table tbody tr { transition: background var(--transition); }
.data-table tbody tr:hover { background: var(--bg-hover); }
.data-table tbody tr.expandable { cursor: pointer; }

/* ===== Badges ===== */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 0.2rem 0.6rem;
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  white-space: nowrap;
}
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-blue { background: var(--blue-dim); color: var(--blue); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }
.badge-gray { background: var(--gray-dim); color: var(--gray); }

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 1rem;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all var(--transition);
  border: 1px solid transparent;
}
.btn-primary { background: var(--blue); color: white; border-color: var(--blue); }
.btn-primary:hover { filter: brightness(1.1); }
.btn-success { background: var(--green); color: white; border-color: var(--green); }
.btn-success:hover { filter: brightness(1.1); }
.btn-danger { background: var(--red); color: white; border-color: var(--red); }
.btn-danger:hover { filter: brightness(1.1); }
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border-color: var(--border);
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-sm { padding: 0.3rem 0.6rem; font-size: 0.75rem; }

/* ===== Cards ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.card-header {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title {
  font-weight: 600;
  font-size: 1rem;
}
.card-body { padding: 1.25rem; }

/* ===== Agent Cards ===== */
.agent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
}
.agent-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  transition: border-color var(--transition);
  cursor: pointer;
}
.agent-card:hover { border-color: var(--text-muted); }
.agent-card-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
.agent-avatar {
  width: 40px; height: 40px;
  border-radius: var(--radius);
  background: var(--blue-dim);
  color: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1rem;
}
.agent-name { font-weight: 600; }
.agent-id { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); }

.trust-bar {
  height: 6px;
  background: var(--bg-primary);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 0.5rem;
}
.trust-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.agent-stats {
  display: flex;
  gap: 1.5rem;
  margin-top: 1rem;
  font-size: 0.85rem;
}
.agent-stat-label { color: var(--text-muted); font-size: 0.75rem; }
.agent-stat-value { font-weight: 600; font-family: var(--font-mono); }

.agent-detail { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.agent-card.expanded .agent-detail { display: block; }
.domain-trust { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-size: 0.85rem; }
.domain-trust-label { color: var(--text-secondary); }

/* ===== Progress bar ===== */
.progress-bar {
  height: 6px;
  background: var(--bg-primary);
  border-radius: 3px;
  overflow: hidden;
  flex: 1;
  margin: 0 0.5rem;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* ===== Modals ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 90%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-weight: 600; font-size: 1.1rem; }
.modal-close {
  background: none; border: none;
  color: var(--text-muted); cursor: pointer;
  font-size: 1.2rem; padding: 0.25rem;
  transition: color var(--transition);
}
.modal-close:hover { color: var(--text-primary); }
.modal-body { padding: 1.5rem; }
.modal-footer {
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 0.5rem;
}

/* ===== Forms ===== */
.form-group { margin-bottom: 1rem; }
.form-label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.4rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 0.6rem 0.75rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.9rem;
  transition: border-color var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--blue);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

/* ===== Activity Feed ===== */
.activity-feed { list-style: none; }
.activity-item {
  display: flex;
  gap: 0.75rem;
  padding: 0.75rem 0;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 0.85rem;
  align-items: flex-start;
}
.activity-item:last-child { border-bottom: none; }
.activity-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
}
.activity-time {
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  margin-left: auto;
  flex-shrink: 0;
}

/* ===== Expandable Rows ===== */
.expand-row { display: none; }
.expand-row.active { display: table-row; }
.expand-content {
  padding: 1rem;
  background: var(--bg-primary);
  border-radius: var(--radius-sm);
}

/* ===== Queue List ===== */
.queue-list { list-style: none; }
.queue-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border-subtle);
  transition: background var(--transition);
}
.queue-item:hover { background: var(--bg-hover); }
.queue-item:last-child { border-bottom: none; }
.queue-position {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--text-muted);
  width: 2rem;
  text-align: center;
}

/* ===== ID display ===== */
.mono { font-family: var(--font-mono); font-size: 0.85rem; }
.truncate-id {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-secondary);
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
}
.empty-state-icon { font-size: 2rem; margin-bottom: 0.75rem; }
.empty-state-text { font-size: 0.95rem; }

/* ===== Inline Actions ===== */
.inline-actions {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}
.inline-input {
  padding: 0.3rem 0.5rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.8rem;
  width: 200px;
}
.inline-input:focus { outline: none; border-color: var(--blue); }

/* ===== Toast ===== */
.toast-container {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.toast {
  padding: 0.75rem 1.25rem;
  border-radius: var(--radius);
  font-size: 0.85rem;
  box-shadow: var(--shadow-lg);
  animation: slideIn 0.3s ease;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  max-width: 360px;
}
.toast-success { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
.toast-error { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
.toast-info { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .agent-grid { grid-template-columns: 1fr; }
  nav { gap: 0; }
  nav button { padding: 0.5rem 0.6rem; font-size: 0.8rem; }
  main { padding: 1rem; }
  .data-table { font-size: 0.8rem; }
  .data-table th, .data-table td { padding: 0.5rem 0.6rem; }
}
@media (max-width: 480px) {
  .metrics-grid { grid-template-columns: 1fr; }
  .logo span { display: none; }
}

/* ===== Stage Pipeline visual ===== */
.pipeline-stages {
  display: flex;
  gap: 0.25rem;
  align-items: center;
}
.pipeline-stage {
  padding: 0.15rem 0.5rem;
  border-radius: var(--radius-sm);
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.pipeline-stage.completed { background: var(--green-dim); color: var(--green); }
.pipeline-stage.active { background: var(--blue-dim); color: var(--blue); animation: pulse 1.5s infinite; }
.pipeline-stage.pending { background: var(--gray-dim); color: var(--gray); }
.pipeline-stage.failed { background: var(--red-dim); color: var(--red); }
.stage-arrow { color: var(--text-muted); font-size: 0.7rem; }

/* Section headers */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}
.section-title {
  font-size: 1.25rem;
  font-weight: 700;
}

/* ===== Tab Transitions ===== */
main {
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Loading Spinner ===== */
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
.spinner-lg { width: 32px; height: 32px; border-width: 3px; }
@keyframes spin {
  to { transform: rotate(360deg); }
}
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
  padding: 3rem 1rem;
  color: var(--text-muted);
}

/* ===== Footer ===== */
.app-footer {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--text-muted);
  flex-shrink: 0;
}
.app-footer a { color: var(--blue); text-decoration: none; }
.app-footer a:hover { text-decoration: underline; }

/* ===== Project Cards ===== */
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1rem;
}
.project-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  transition: border-color var(--transition), transform var(--transition);
  cursor: pointer;
}
.project-card:hover { border-color: var(--text-muted); transform: translateY(-1px); }
.project-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 0.75rem;
}
.project-title { font-weight: 600; font-size: 1rem; }
.project-desc {
  color: var(--text-secondary);
  font-size: 0.85rem;
  margin-bottom: 1rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.project-progress {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.project-progress .progress-bar { flex: 1; }
.project-meta {
  display: flex;
  gap: 1rem;
  margin-top: 0.75rem;
  font-size: 0.8rem;
  color: var(--text-muted);
}

/* ===== Milestone List ===== */
.milestone-list { list-style: none; }
.milestone-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 0;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 0.9rem;
}
.milestone-item:last-child { border-bottom: none; }
.milestone-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 0.7rem;
  color: transparent;
}
.milestone-check.done {
  border-color: var(--green);
  background: var(--green-dim);
  color: var(--green);
}
.milestone-check.active {
  border-color: var(--blue);
  background: var(--blue-dim);
  color: var(--blue);
}

/* ===== Enhanced Agent Card ===== */
.agent-status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.agent-status-dot.available { background: var(--green); }
.agent-status-dot.busy { background: var(--amber); }
.agent-status-dot.offline { background: var(--gray); }

/* Phase badges */
.phase-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.15rem 0.5rem;
  border-radius: 9999px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.phase-badge.phase-idle { background: rgba(148,163,184,0.15); color: var(--text-muted); }
.phase-badge.phase-claiming { background: rgba(59,130,246,0.15); color: var(--blue); }

<script>
// ===== API Client =====
const api = {
  async get(path) {
    try {
      const r = await fetch(`/api${path}`);
      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: r.statusText }));
        throw new Error(err.detail || r.statusText);
      }
      return r.json();
    } catch (e) {
      if (e.message === 'Failed to fetch') throw new Error('Connection lost');
      throw e;
    }
  },
  async post(path, body = {}) {
    try {
      const r = await fetch(`/api${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: r.statusText }));
        throw new Error(err.detail || r.statusText);
      }
      return r.json();
    } catch (e) {
      if (e.message === 'Failed to fetch') throw new Error('Connection lost');
      throw e;
    }
  },
  async patch(path, body = {}) {
    try {
      const r = await fetch(`/api${path}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: r.statusText }));
        throw new Error(err.detail || r.statusText);
      }
      return r.json();
    } catch (e) {
      if (e.message === 'Failed to fetch') throw new Error('Connection lost');
      throw e;
    }
  },
  async del(path) {
    try {
      const r = await fetch(`/api${path}`, { method: 'DELETE' });
      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: r.statusText }));
        throw new Error(err.detail || r.statusText);
      }
      return r.json();
    } catch (e) {
      if (e.message === 'Failed to fetch') throw new Error('Connection lost');
      throw e;
    }
  },
  async put(path, body = {}) {
    try {
      const r = await fetch(`/api${path}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: r.statusText }));
        throw new Error(err.detail || r.statusText);
      }
      return r.json();
    } catch (e) {
      if (e.message === 'Failed to fetch') throw new Error('Connection lost');
      throw e;
    }
  },
};

// ===== State =====
let currentPage = 'dashboard';
let currentProjectFilter = null; // project ID to filter goals by
let refreshInterval = null;
let wsConnection = null;

// ===== Router =====
const pages = {
  dashboard: renderDashboard,
  activity: renderActivity,
  goals: renderGoals,
  pipeline: renderPipeline,
  agents: renderAgents,
  queue: renderQueue,
  constraints: renderConstraints,
  projects: renderProjects,
  config: renderConfig,
};

function navigate(page, {updateHash = true} = {}) {
  if (!pages[page]) page = 'dashboard';
  currentPage = page;
  if (updateHash) location.hash = '#/' + page;
  document.querySelectorAll('#main-nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  pages[page]();
  startAutoRefresh();
}

// Nav click handlers
document.querySelectorAll('#main-nav button').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.page));
});

// Hash-based routing — restore tab on load & browser back/forward
window.addEventListener('hashchange', () => {
  const page = location.hash.replace(/^#\/?/, '') || 'dashboard';
  if (page !== currentPage && pages[page]) navigate(page, {updateHash: false});
});

// ===== Auto-refresh =====
function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    if (currentPage === 'dashboard') renderDashboard();
    if (currentPage === 'activity') updateActivityTimestamps();
  }, 5000);
}

// ===== Toast Notifications =====
function toast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => { el.remove(); }, 4000);
}

// ===== Modal =====
function showModal(html) {
  if (html !== undefined) {
    document.getElementById('modal-content').innerHTML = html;
  }
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ===== Utilities =====
function truncateId(id) {
  if (!id) return '---';
  return id.substring(0, 8);
}

function formatDate(dateStr) {
  if (!dateStr) return '---';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h ago`;
  const diffDay = Math.floor(diffHr / 24);
  return `${diffDay}d ago`;
}

function statusBadge(status) {
  const colors = {
    active: 'green', running: 'green', completed: 'gray', success: 'green',
    draft: 'blue', pending: 'blue', queued: 'blue',
    failed: 'red', rejected: 'red', cancelled: 'red',
    blocked: 'amber', 'human-approval': 'amber',
    'in_progress': 'green', 'auto-deploy': 'green',
    'agent-review': 'purple', canary: 'purple',
  };
  const color = colors[(status || '').toLowerCase()] || 'gray';
  return `<span class="badge badge-${color}">${escapeHtml(status || 'unknown')}</span>`;
}

function priorityBadge(priority) {
  const colors = { critical: 'red', high: 'amber', medium: 'blue', low: 'gray' };
  const color = colors[(priority || '').toLowerCase()] || 'gray';
  return `<span class="badge badge-${color}">${escapeHtml(priority || 'medium')}</span>`;
}

function severityBadge(severity) {
  const colors = { must: 'red', should: 'amber', prefer: 'blue' };
  const color = colors[(severity || '').toLowerCase()] || 'gray';
  return `<span class="badge badge-${color}">${escapeHtml(severity || '---')}</span>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function trustColor(score) {
  if (score >= 0.7) return 'var(--green)';
  if (score >= 0.4) return 'var(--amber)';
  return 'var(--red)';
}

function healthColor(data) {
  if (!data) return 'blue';
  if (data.pending_approvals > 3 || data.deploy_queue_length > 5) return 'red';
  if (data.pending_approvals > 0 || data.deploy_queue_length > 2) return 'amber';
  return 'green';
}

const app = document.getElementById('app');

// ===== Dashboard =====

      <div class="metric-card ${data.pending_approvals > 0 ? 'amber' : 'green'}">
        <div class="metric-icon amber">&#9888;</div>

        <div class="metric-label">Active Agents</div>
      </div>
      <div class="metric-card ${data.deploy_queue_length > 0 ? 'amber' : 'green'}">
        <div class="metric-icon ${data.deploy_queue_length > 2 ? 'amber' : 'green'}">&#9776;</div>
        <div class="metric-value">${data.deploy_queue_length || 0}</div>
        <div class="metric-label">Deploy Queue</div>

// ===== Goals =====
async function renderGoals() {
  const filterHtml = currentProjectFilter
    ? `<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem">
        <span style="color:var(--text-muted);font-size:0.85rem">Filtered by project</span>
        <span class="badge badge-blue" id="project-filter-name">...</span>
        <button class="btn btn-sm btn-ghost" onclick="currentProjectFilter=null;navigate('goals')">Show All</button>
       </div>`
    : '';
  app.innerHTML = `
    <div class="section-header">
      <h1 class="section-title">Goals</h1>
      <button class="btn btn-primary" onclick="showNewGoalModal()">+ New Goal</button>
    </div>
    ${filterHtml}
    <div class="card">
      <div class="card-body" id="goals-body" style="padding:0">
        <div class="loading-state"><div class="spinner spinner-lg"></div><span>Loading...</span></div>
      </div>
    </div>
  `;
  await loadGoalsTable();
}

async function loadGoalsTable() {
  const body = document.getElementById('goals-body');
  try {
    const [goals, goalMap] = await Promise.all([
      currentProjectFilter
        ? api.get(`/projects/${currentProjectFilter}/goals`)
        : api.get('/goals'),
      currentProjectFilter ? Promise.resolve({}) : api.get('/projects/goal-map').catch(() => ({})),
    ]);
    // Sort newest first
    goals.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
    // Update filter label with project name if filtering
    if (currentProjectFilter) {
      try {
        const proj = await api.get(`/projects/${currentProjectFilter}`);
        const label = document.getElementById('project-filter-name');
        if (label) label.textContent = proj.title || proj.name || currentProjectFilter.substring(0,8);
      } catch(e) {}
    }
    const showProjectCol = !currentProjectFilter;
    if (!goals || goals.length === 0) {
      body.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9673;</div><div class="empty-state-text">No goals yet. Create one to get started.</div></div>';
      return;
    }
    body.innerHTML = `
      <table class="data-table">
        <thead><tr>
          <th>Title</th>${showProjectCol ? '<th>Project</th>' : ''}<th>Status</th><th>Priority</th><th>Created</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${goals.map(g => {
            const pm = goalMap[g.goal_id];
            const projectCell = showProjectCol
              ? `<td>${pm
                  ? `<a href="#" onclick="event.stopPropagation();currentProjectFilter='${escapeHtml(pm.project_id)}';navigate('goals');return false" style="color:var(--blue);text-decoration:none;font-size:0.85rem">${escapeHtml(pm.project_title)}</a><br><span style="color:var(--text-muted);font-size:0.75rem">${escapeHtml(pm.milestone_title)}</span>`
                  : '<span style="color:var(--text-muted);font-size:0.8rem">No project</span>'
                }</td>`
              : '';
            return `
            <tr class="expandable" data-goal-id="${g.goal_id}">
              <td><strong>${escapeHtml(g.title)}</strong><br><span style="color:var(--text-muted);font-size:0.8rem">${escapeHtml(g.description || '').substring(0, 80)}</span></td>
              ${projectCell}
              <td>${statusBadge(g.status)}</td>
              <td>${priorityBadge(g.priority)}</td>
              <td class="truncate-id">${formatDate(g.created_at)}</td>
              <td>
                <div class="inline-actions">
                  ${g.status === 'draft' ? `<button class="btn btn-sm btn-success" onclick="event.stopPropagation();activateGoal('${g.goal_id}')">Activate</button>` : ''}
                  ${g.status !== 'cancelled' && g.status !== 'completed' ? `<button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();cancelGoal('${g.goal_id}')">Cancel</button>` : ''}
                </div>
              </td>
            </tr>
            <tr class="expand-row" id="goal-detail-${g.goal_id}">
              <td colspan="${showProjectCol ? 6 : 5}">
                <div class="expand-content" id="goal-tasks-${g.goal_id}">Loading tasks...</div>
              </td>
            </tr>
          `}).join('')}
        </tbody>
      </table>
    `;

    // Expandable rows
    body.querySelectorAll('tr.expandable').forEach(row => {
      row.addEventListener('click', async () => {
        const goalId = row.dataset.goalId;
        const detailRow = document.getElementById(`goal-detail-${goalId}`);
        const isOpen = detailRow.classList.contains('active');
        // Close all
        body.querySelectorAll('.expand-row').forEach(r => r.classList.remove('active'));
        if (!isOpen) {
          detailRow.classList.add('active');
          await loadGoalTasks(goalId);
        }
      });
    });
  } catch (e) {
    body.innerHTML = `<div class="empty-state"><div class="empty-state-text">Error: ${escapeHtml(e.message)}</div></div>`;
  }
}

async function loadGoalTasks(goalId) {
  // All dynamic text escaped via escapeHtml() to prevent XSS
  const container = document.getElementById(`goal-tasks-${goalId}`);
  try {
    const data = await api.get(`/goals/${goalId}`);
    const tasks = data.tasks || [];
    if (tasks.length === 0) {
      container.innerHTML = '<p style="color:var(--text-muted)">No tasks yet. Activate this goal to decompose it into tasks.</p>';
      return;
    }
    container.innerHTML = `
      <table class="data-table" style="margin:-1rem">
        <thead><tr><th>Task</th><th>Status</th><th>Type</th><th>Agent</th><th>Actions</th></tr></thead>
        <tbody>${tasks.map(t => {
          _taskCache[t.task_id] = t;
          const agentId = t.assigned_agent || t.agent_id || null;
          const matchScore = t.match_score ?? t.routing_score ?? null;
          const matchReasons = t.match_reasons || t.routing_reasons || [];
          const taskStatus = (t.status || '').toLowerCase();
          const canRoute = !agentId && (taskStatus === 'pending' || taskStatus === 'ready');
          return `
          <tr style="cursor:pointer" onclick="showTaskDetail('${t.task_id}')">
            <td><span class="mono">${truncateId(t.task_id)}</span> ${escapeHtml(t.title || t.description || '')}</td>
            <td>${statusBadge(t.status)}</td>
            <td><span style="color:var(--text-muted)">${escapeHtml(t.task_type || '---')}</span></td>
            <td>
              ${agentId ? `
                <div>
                  <span class="mono">${truncateId(agentId)}</span>
                  ${matchScore !== null ? `<span class="match-score badge badge-blue">${(matchScore * 100).toFixed(0)}%</span>` : ''}
                </div>
                ${matchReasons.length > 0 ? `<div class="routing-info">${matchReasons.slice(0, 3).map(r => `<span class="badge badge-gray" style="font-size:0.65rem">${escapeHtml(r)}</span>`).join('')}</div>` : ''}
              ` : '<span style="color:var(--text-muted)">unassigned</span>'}
            </td>
            <td>
              ${canRoute ? `<button class="btn btn-sm btn-primary" onclick="event.stopPropagation();routeTask('${t.task_id}','${goalId}')">Route</button>` : ''}
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    `;
  } catch (e) {
    container.innerHTML = `<p style="color:var(--red)">Failed to load tasks: ${escapeHtml(e.message)}</p>`;
  }
}

async function routeTask(taskId, goalId) {
  try {
    await api.post(`/routing/route/${taskId}`);
    toast('Task routed to best available agent', 'success');
    await loadGoalTasks(goalId);
  } catch (e) {
    toast(`Failed to route task: ${e.message}`, 'error');
  }
}

const _taskCache = {};
function showTaskDetail(taskOrId) {
  const task = typeof taskOrId === 'string' ? _taskCache[taskOrId] : taskOrId;
  if (!task) return;
  const agentId = task.assigned_agent || task.agent_id || null;
  const matchScore = task.match_score ?? task.routing_score ?? null;
  const matchReasons = task.match_reasons || task.routing_reasons || [];
  const deps = task.depends_on || [];
  const constraints = task.constraints || [];
  const files = task.target_files || [];
  const taskStatus = (task.status || 'unknown').toLowerCase();

  const modalEl = document.getElementById('modal-content');
  modalEl.textContent = '';

  const header = document.createElement('div');
  header.className = 'modal-header';
  const titleSpan = document.createElement('span');
  titleSpan.className = 'modal-title';
  titleSpan.textContent = 'Task Details';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.textContent = '\u00D7';
  closeBtn.onclick = closeModal;
  header.appendChild(titleSpan);
  header.appendChild(closeBtn);
  modalEl.appendChild(header);

  const body = document.createElement('div');
  body.className = 'modal-body';

  // Build detail rows safely
  const rows = [];
  rows.push({label: 'Title', value: task.title || task.description || '---'});
  rows.push({label: 'Task ID', value: task.task_id || '---', mono: true});
  rows.push({label: 'Status', html: statusBadge(task.status)});
  rows.push({label: 'Risk', value: task.estimated_risk || '---'});

  if (agentId) {
    let agentHtml = '<span class="mono">' + escapeHtml(agentId) + '</span>';
    if (matchScore !== null) {
      agentHtml += ' <span class="badge badge-blue">' + (matchScore * 100).toFixed(0) + '% match</span>';
    }
    rows.push({label: 'Assigned Agent', html: agentHtml});
  } else {
    rows.push({label: 'Assigned Agent', value: 'Unassigned'});
  }

  if (matchReasons.length > 0) {
    const reasonsHtml = matchReasons.map(function(r) {
      return '<span class="badge badge-gray" style="font-size:0.7rem;margin-right:0.25rem">' + escapeHtml(r) + '</span>';
    }).join('');
    rows.push({label: 'Match Reasons', html: reasonsHtml});
  }

  if (task.description && task.title !== task.description) {
    rows.push({label: 'Description', value: task.description});
  }

  if (files.length > 0) {
    const filesHtml = files.map(function(f) {
      return '<span style="font-family:var(--font-mono);font-size:0.8rem;background:var(--bg-primary);padding:0.1rem 0.4rem;border-radius:3px;margin-right:0.25rem">' + escapeHtml(f) + '</span>';
    }).join('');
    rows.push({label: 'Target Files', html: filesHtml});
  }

  if (constraints.length > 0) {
    rows.push({label: 'Constraints', value: constraints.join(', ')});
  }

  if (deps.length > 0) {
    const depsHtml = deps.map(function(d) {
      return '<span class="mono" style="font-size:0.8rem">' + escapeHtml(String(d).substring(0, 8)) + '</span>';
    }).join(', ');
    rows.push({label: 'Depends On', html: depsHtml});
  }

  let tableHtml = '<table style="width:100%;border-collapse:collapse">';
  rows.forEach(function(row) {
    tableHtml += '<tr style="border-bottom:1px solid var(--border-subtle)">';
    tableHtml += '<td style="padding:0.6rem 0.75rem;font-size:0.8rem;color:var(--text-muted);white-space:nowrap;vertical-align:top;width:120px">' + escapeHtml(row.label) + '</td>';
    if (row.html) {
      tableHtml += '<td style="padding:0.6rem 0.75rem;font-size:0.9rem">' + row.html + '</td>';
    } else {
      tableHtml += '<td style="padding:0.6rem 0.75rem;font-size:0.9rem;' + (row.mono ? 'font-family:var(--font-mono);' : '') + '">' + escapeHtml(row.value) + '</td>';
    }
    tableHtml += '</tr>';
  });
  tableHtml += '</table>';

  body.innerHTML = tableHtml;
  modalEl.appendChild(body);

  // Footer with pipeline link if applicable
  const footer = document.createElement('div');
  footer.className = 'modal-footer';
  const closeFooterBtn = document.createElement('button');
  closeFooterBtn.className = 'btn btn-ghost';
  closeFooterBtn.textContent = 'Close';
  closeFooterBtn.onclick = closeModal;
  footer.appendChild(closeFooterBtn);

  if (taskStatus === 'completed' || taskStatus === 'failed' || taskStatus === 'in_progress') {
    const pipeBtn = document.createElement('button');
    pipeBtn.className = 'btn btn-primary';
    pipeBtn.textContent = 'View Pipeline Runs';
    pipeBtn.onclick = function() { closeModal(); navigate('pipeline'); };
    footer.appendChild(pipeBtn);
  }
  modalEl.appendChild(footer);

  showModal();
}

async function showNewGoalModal() {
  // Load all projects for the dropdown
  let projects = [];
  try { projects = await api.get('/projects'); } catch(e) {}
  const activeProjects = projects.filter(p => p.status === 'active' || p.status === 'planning');

  const preselected = currentProjectFilter || '';

  showModal(`
    <div class="modal-header">
      <span class="modal-title">Create New Goal</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Project</label>
        <select class="form-select" id="goal-project" onchange="onGoalProjectChange()">
          <option value="">(No project — standalone goal)</option>
          ${activeProjects.map(p => `<option value="${p.project_id}" ${p.project_id === preselected ? 'selected' : ''}>${escapeHtml(p.title)} (${p.status})</option>`).join('')}
        </select>
      </div>
      <div id="goal-milestone-wrap"></div>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input class="form-input" id="goal-title" placeholder="e.g. Add rate limiting to API">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="goal-description" placeholder="Describe what you want to achieve..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="goal-priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
          <option value="critical">Critical</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Constraints</label>
        <input class="form-input" id="goal-constraints" placeholder="constraint1, constraint2, ...">
        <div class="form-hint">Comma-separated list of constraint names</div>
      </div>
      <div class="form-group">
        <label class="form-label">Acceptance Criteria</label>
        <input class="form-input" id="goal-criteria" placeholder="criterion1, criterion2, ...">
        <div class="form-hint">Comma-separated acceptance criteria</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitNewGoal()">Create Goal</button>
    </div>
  `);
  // Load milestones if a project is preselected
  if (preselected) await onGoalProjectChange();
  setTimeout(() => document.getElementById('goal-title')?.focus(), 100);
}

async function onGoalProjectChange() {
  const projectId = document.getElementById('goal-project').value;
  const wrap = document.getElementById('goal-milestone-wrap');
  if (!projectId) { wrap.innerHTML = ''; return; }
  try {
    const milestones = await api.get(`/projects/${projectId}/milestones`);
    const eligible = milestones.filter(m => m.status === 'active' || m.status === 'pending');
    if (eligible.length === 0) {
      wrap.innerHTML = '<div class="form-hint" style="color:var(--yellow);margin-bottom:0.75rem">No active or pending milestones in this project.</div>';
      return;
    }
    wrap.innerHTML = `<div class="form-group">
      <label class="form-label">Milestone</label>
      <select class="form-select" id="goal-milestone">
        ${eligible.map(m => `<option value="${m.milestone_id}" ${m.status === 'active' ? 'selected' : ''}>${escapeHtml(m.title)} (${m.status})</option>`).join('')}
      </select>
    </div>`;
  } catch(e) { wrap.innerHTML = ''; }
}

async function submitNewGoal() {
  const title = document.getElementById('goal-title').value.trim();
  const description = document.getElementById('goal-description').value.trim();
  const priority = document.getElementById('goal-priority').value;
  const constraintsRaw = document.getElementById('goal-constraints').value.trim();
  const criteriaRaw = document.getElementById('goal-criteria').value.trim();
  const projectEl = document.getElementById('goal-project');
  const projectId = projectEl ? projectEl.value : '';
  const milestoneEl = document.getElementById('goal-milestone');
  const milestoneId = milestoneEl ? milestoneEl.value : null;

  if (!title) { toast('Title is required', 'error'); return; }
  if (!description) { toast('Description is required', 'error'); return; }

  const constraints = constraintsRaw ? constraintsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
  const acceptance_criteria = criteriaRaw ? criteriaRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

  try {
    if (projectId && milestoneId) {
      await api.post(
        `/projects/${projectId}/milestones/${milestoneId}/goals`,
        { title, description, priority, constraints, acceptance_criteria }
      );
      closeModal();
      toast('Goal created and linked to project', 'success');
    } else {
      await api.post('/goals', { title, description, priority, constraints, acceptance_criteria });
      closeModal();
      toast('Goal created successfully', 'success');
    }
    await loadGoalsTable();
  } catch (e) {
    toast(`Failed to create goal: ${e.message}`, 'error');
  }
}

async function activateGoal(goalId) {
  try {
    await api.post(`/goals/${goalId}/activate`);
    toast('Goal activated and decomposed into tasks', 'success');
    await loadGoalsTable();

}

async function cancelGoal(goalId) {
  try {
    await api.post(`/goals/${goalId}/cancel`);
    toast('Goal cancelled', 'info');
    await loadGoalsTable();
  } catch (e) {
    toast(`Failed to cancel: ${e.message}`, 'error');

}

// ===== Pipeline =====
async function renderPipeline() {
  app.innerHTML = `
    <div class="section-header">
      <h1 class="section-title">Pipeline Runs</h1>
      <button class="btn btn-ghost" onclick="renderPipeline()">Refresh</button>
    </div>
    <div class="card">
      <div class="card-body" id="pipeline-body" style="padding:0">
        <div class="loading-state"><div class="spinner spinner-lg"></div><span>Loading...</span></div>

async function loadPipelineTable() {
  const body = document.getElementById('pipeline-body');
  try {
    const runs = await api.get('/runs?limit=50');
    if (!runs || runs.length === 0) {
      body.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9654;</div><div class="empty-state-text">No pipeline runs yet.</div></div>';
      return;
    }
    body.innerHTML = `
      <table class="data-table">
        <thead><tr>
          <th>Run ID</th><th style="min-width:120px">Agent</th><th>Status</th><th>Stage</th><th>Started</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${runs.map(r => {
            const runId = r.run_id || r.id || '';
            const isBlocked = (r.status || '').toLowerCase() === 'blocked' ||
                              (r.deploy_route || '').toLowerCase() === 'human-approval';
            return `
            <tr class="expandable" data-run-id="${runId}">
              <td class="truncate-id">${truncateId(runId)}</td>
              <td style="font-size:0.85rem" title="${escapeHtml(r.agent_id || '')}">${escapeHtml(r.agent_id || '---')}</td>
              <td>${statusBadge(r.status)}</td>
              <td><span style="color:var(--text-secondary)">${escapeHtml(r.current_stage || r.stage || '---')}</span></td>
              <td class="truncate-id">${formatDate(r.started_at || r.created_at)}</td>
              <td>
                ${isBlocked ? `
                  <div class="inline-actions">
                    <button class="btn btn-sm btn-success" onclick="event.stopPropagation();showApproveDialog('${runId}')">Approve</button>
                    <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();showRejectDialog('${runId}')">Reject</button>
                  </div>
                ` : ''}
              </td>
            </tr>
            <tr class="expand-row" id="run-detail-${runId}">
              <td colspan="6">
                <div class="expand-content" id="run-stages-${runId}">Loading stages...</div>
              </td>
            </tr>
          `}).join('')}
        </tbody>
      </table>
    `;

    body.querySelectorAll('tr.expandable').forEach(row => {
      row.addEventListener('click', () => {
        const runId = row.dataset.runId;
        const detailRow = document.getElementById(`run-detail-${runId}`);
        const isOpen = detailRow.classList.contains('active');
        body.querySelectorAll('.expand-row').forEach(r => r.classList.remove('active'));
        if (!isOpen) {
          detailRow.classList.add('active');
          renderRunStages(runId, runs.find(r => (r.run_id || r.id) === runId));
        }
      });
    });
  } catch (e) {
    body.innerHTML = `<div class="empty-state"><div class="empty-state-text">Error: ${escapeHtml(e.message)}</div></div>`;
  }
}

function renderRunStages(runId, run) {
  // Note: all dynamic values are escaped via escapeHtml() before insertion
  const container = document.getElementById(`run-stages-${runId}`);
  if (!run) { container.textContent = 'No data'; return; }

  const allStages = ['INTENT', 'SANDBOX', 'VALIDATION', 'TRUST_ROUTING', 'DEPLOY'];
  const currentStage = (run.current_stage || '').toUpperCase();
  const status = (run.status || '').toLowerCase();
  const stageResults = run.stage_results || run.stages || {};
  const meta = run.metadata || {};
  const riskData = meta.risk_assessment || {};
  const isBlocked = status === 'blocked';

  // --- Build human-readable risk explanation ---
  function buildRiskExplanation(factors, agentId, agentTrust) {
    const lines = [];
    const factorMap = {};
    (factors || []).forEach(f => { factorMap[f.name] = f; });

    // File sensitivity
    const fs = factorMap['file_sensitivity'];
    if (fs) {
      if (fs.score >= 0.8) lines.push('This change touches sensitive files (infrastructure, config, or auth-related). These files can cause outages if broken.');
      else if (fs.score >= 0.5) lines.push('The files being changed are moderately sensitive.');
    }

    // Blast radius
    const br = factorMap['blast_radius'];
    if (br && br.score >= 0.5) {
      lines.push(`This change affects multiple services, increasing the blast radius if something goes wrong.`);
    }

    // Agent trust
    const at = factorMap['agent_trust'];
    if (at) {
      if (agentTrust !== undefined && agentTrust < 0.6) {
        lines.push(`${agentId || 'This agent'} is relatively new and hasn't built up enough trust yet. Trust increases automatically with each successful deployment.`);
      } else if (at.score >= 0.5) {
        lines.push(`${agentId || 'This agent'} has moderate trust. More successful deployments will reduce future risk scores.`);
      }
    }

    // Validation confidence
    const vc = factorMap['validation_confidence'];
    if (vc && vc.score >= 0.7) {
      lines.push('Automated validation had low confidence in this change, which means the safety checks could not fully verify it.');
    }

    // Time of day
    const tod = factorMap['time_of_day'];
    if (tod && tod.score >= 0.6) {
      lines.push('This deploy is happening outside business hours, when incident response is slower.');
    }

    if (lines.length === 0) lines.push('Multiple risk factors combined to push the overall score above the auto-deploy threshold.');

    return lines;
  }

  // --- Summary card for blocked runs ---
  let summaryHtml = '';
  if (isBlocked) {
    const riskScore = riskData.risk_score;
    const riskPct = riskScore !== undefined ? (riskScore * 100).toFixed(0) : '?';
    const riskColor = riskScore >= 0.7 ? 'var(--red)' : riskScore >= 0.4 ? 'var(--amber)' : 'var(--green)';
    const riskLevel = riskData.risk_level || 'unknown';
    const route = riskData.recommended_route || 'human_approval';
    const riskExplanation = buildRiskExplanation(riskData.factors, run.agent_id, riskData.agent_trust_score);

    summaryHtml = `
      <div style="background:var(--bg-primary);border:1px solid var(--amber);border-radius:8px;padding:1rem 1.25rem;margin-bottom:1rem">
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem">
          <span style="font-size:1.2rem;color:var(--amber)">&#9888;</span>
          <strong style="flex:1">Awaiting Human Approval</strong>
          <span style="font-family:var(--font-mono);font-weight:700;color:${riskColor};font-size:1.1rem">${riskPct}% risk</span>
          ${statusBadge(riskLevel)}
        </div>
        ${meta.intent_description ? `
          <div style="font-size:0.9rem;color:var(--text-primary);margin-bottom:0.75rem;line-height:1.5">
            ${escapeHtml(meta.intent_description)}
          </div>
        ` : ''}
        <div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.75rem">
          <strong style="color:var(--text-primary)">Agent:</strong> ${escapeHtml(run.agent_id)}
          <span style="margin-left:1rem"><strong style="color:var(--text-primary)">Route:</strong> ${escapeHtml(route.replace(/_/g, ' '))}</span>
        </div>
        <div style="background:var(--bg-card);border-radius:8px;padding:0.75rem 1rem;margin-bottom:0.75rem;border-left:3px solid var(--amber)">
          <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem;text-transform:uppercase;font-weight:600;letter-spacing:0.03em">Why this needs your approval</div>
          <ul style="margin:0;padding-left:1.25rem;font-size:0.85rem;color:var(--text-primary);line-height:1.7">
            ${riskExplanation.map(line => `<li>${escapeHtml(line)}</li>`).join('')}
          </ul>
        </div>
        ${(meta.intent_files || []).length > 0 ? `
          <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.25rem;text-transform:uppercase;font-weight:600">Files changed</div>
          <div style="font-family:var(--font-mono);font-size:0.8rem;color:var(--text-secondary);margin-bottom:0.75rem;line-height:1.8">
            ${(meta.intent_files || []).map(f => `<span style="background:var(--bg-card);padding:0.15rem 0.5rem;border-radius:4px;margin-right:0.35rem;white-space:nowrap">${escapeHtml(f)}</span>`).join('')}
          </div>
        ` : ''}
        ${(riskData.factors || []).length > 0 ? `
          <details style="margin-bottom:0.5rem">
            <summary style="font-size:0.8rem;color:var(--text-muted);cursor:pointer;text-transform:uppercase;font-weight:600;margin-bottom:0.5rem">Risk factor breakdown</summary>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0.5rem;margin-top:0.5rem">
              ${(riskData.factors || []).map(f => {
                const val = (f.score * 100).toFixed(0);
                const fColor = f.score >= 0.7 ? 'var(--red)' : f.score >= 0.4 ? 'var(--amber)' : 'var(--green)';
                return `<div style="background:var(--bg-primary);border-radius:6px;padding:0.5rem 0.75rem">
                  <div style="display:flex;justify-content:space-between;align-items:center">
                    <span style="font-size:0.8rem;color:var(--text-secondary)">${escapeHtml(f.name.replace(/_/g, ' '))}</span>
                    <span style="font-family:var(--font-mono);font-weight:600;color:${fColor}">${val}%</span>
                  </div>
                  <div style="font-size:0.7rem;color:var(--text-muted);margin-top:0.2rem">${escapeHtml(f.description)}</div>
                </div>`;
              }).join('')}
            </div>
          </details>
          ${riskData.agent_trust_score !== undefined ? `
            <div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.5rem">
              Agent trust: <strong style="color:var(--amber)">${(riskData.agent_trust_score * 100).toFixed(0)}%</strong>
              — trust increases automatically with each successful deployment.
            </div>
          ` : ''}
        ` : ''}
      </div>
    `;
  }

  // --- Stage pipeline visualization ---
  let stagesHtml = '<div class="pipeline-stages">';
  allStages.forEach((stage, i) => {
    const sr = stageResults[stage.toLowerCase()] || stageResults[stage];
    let cls = 'pending';
    if (sr) {
      const srStatus = (sr.status || '').toLowerCase();
      if (srStatus === 'passed') cls = 'completed';
      else if (srStatus === 'failed') cls = 'failed';
      else if (srStatus === 'blocked') cls = 'active';
      else cls = 'completed';
    }
    stagesHtml += `<span class="pipeline-stage ${cls}">${stage}</span>`;
    if (i < allStages.length - 1) stagesHtml += '<span class="stage-arrow">&#8594;</span>';
  });
  stagesHtml += '</div>';

  // --- Stage details (collapsible) ---
  let detailHtml = '';
  if (Object.keys(stageResults).length > 0) {
    detailHtml = '<div style="margin-top:1rem">';
    for (const [stage, result] of Object.entries(stageResults)) {
      const stageStatus = (result.status || '').toLowerCase();
      const passed = stageStatus === 'passed';
      const stageId = `stage-${escapeHtml(runId)}-${escapeHtml(stage)}`;
      detailHtml += `
        <div style="margin-bottom:0.25rem">
          <div class="collapsible-header" onclick="toggleCollapsible('${stageId}', this)">
            <span class="collapsible-arrow">&#9654;</span>
            <span class="signal-icon ${passed ? 'pass' : 'fail'}">${passed ? '&#10003;' : '&#10007;'}</span>
            <strong style="text-transform:uppercase;flex:1">${escapeHtml(stage)}</strong>
            <span class="badge badge-${passed ? 'green' : (stageStatus === 'blocked' ? 'amber' : 'red')}">${escapeHtml(stageStatus || 'unknown')}</span>
          </div>
          <div class="collapsible-body" id="${stageId}">
            ${renderStageDetail(stage, result.output || result)}
          </div>
        </div>`;
    }
    detailHtml += '</div>';
  }

  // --- Worktree / branch info ---
  let worktreeHtml = '';
  const wtPath = meta.worktree_path;
  const branchName = meta.branch_name;
  if (wtPath || branchName) {
    const merged = meta.merged ? '<span class="badge badge-green" style="margin-left:0.5rem">merged</span>' : '';
    const committed = meta.worktree_committed ? '<span class="badge badge-blue" style="margin-left:0.5rem">committed</span>' : '';
    worktreeHtml = `
      <div style="background:var(--bg-card);border-radius:8px;padding:0.75rem 1rem;margin-top:0.75rem;border:1px solid var(--border-subtle);font-size:0.85rem">
        <div style="display:flex;align-items:center;gap:0.5rem;color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;font-weight:600;margin-bottom:0.35rem">Git Worktree</div>
        ${branchName ? `<div style="margin-bottom:0.25rem"><span style="color:var(--text-muted)">Branch:</span> <code style="color:var(--blue)">${escapeHtml(branchName)}</code>${merged}${committed}</div>` : ''}
        ${wtPath ? `<div><span style="color:var(--text-muted)">Path:</span> <code style="font-size:0.8rem">${escapeHtml(wtPath)}</code></div>` : ''}
      </div>
    `;
  }

  // --- Diff viewer ---
  let diffHtml = '';
  const runDiff = run.metadata?.diff;
  if (runDiff) {
    const diffLines = runDiff.split('\n').map(line => {
      const eLine = escapeHtml(line);
      if (line.startsWith('+++ ') || line.startsWith('--- ')) {
        return `<span style="color:var(--text-muted);font-weight:600">${eLine}</span>`;
      } else if (line.startsWith('diff --git')) {
        return `<span style="color:var(--blue);font-weight:700;display:block;margin-top:0.75rem;padding-bottom:0.25rem;border-bottom:1px solid var(--border)">${eLine}</span>`;
      } else if (line.startsWith('@@')) {
        return `<span style="color:var(--blue)">${eLine}</span>`;
      } else if (line.startsWith('+')) {
        return `<span style="color:#4ade80;background:rgba(74,222,128,0.08)">${eLine}</span>`;
      } else if (line.startsWith('-')) {
        return `<span style="color:#f87171;background:rgba(248,113,113,0.08)">${eLine}</span>`;
      }
      return `<span>${eLine}</span>`;
    }).join('\n');

    diffHtml = `
      <details style="margin-top:1rem" open>
        <summary style="font-size:0.85rem;color:var(--text-muted);cursor:pointer;text-transform:uppercase;font-weight:600;margin-bottom:0.5rem;letter-spacing:0.03em">Code Changes</summary>
        <pre style="background:var(--bg-card);border-radius:8px;padding:1rem;font-size:0.78rem;line-height:1.6;overflow-x:auto;max-height:500px;overflow-y:auto;border:1px solid var(--border);margin:0">${diffLines}</pre>
      </details>`;
  }

  container.innerHTML = summaryHtml + stagesHtml + worktreeHtml + diffHtml + detailHtml;
}

function toggleCollapsible(id, header) {
  const body = document.getElementById(id);
  if (!body) return;
  header.classList.toggle('open');
  body.classList.toggle('open');
}

// All values rendered via escapeHtml() to prevent XSS
function renderStageDetail(stage, result) {
  const stageLower = stage.toLowerCase();

  // Validation stage: show individual signal results
  if (stageLower === 'validation') {
    const signals = result.signals || result.signal_results || {};
    if (Object.keys(signals).length > 0) {
      return Object.entries(signals).map(([name, sig]) => {
        const sigPassed = sig.passed !== undefined ? sig.passed : (sig.score >= 0.5);
        const findings = sig.findings || sig.issues || [];
        return `
          <div class="signal-result">
            <span class="signal-icon ${sigPassed ? 'pass' : 'fail'}">${sigPassed ? '&#10003;' : '&#10007;'}</span>
            <span class="signal-name">${escapeHtml(name.replace(/_/g, ' '))}</span>
            ${sig.score !== undefined ? `<span class="signal-score">${(sig.score * 100).toFixed(0)}%</span>` : ''}
            <span class="badge badge-${sigPassed ? 'green' : 'red'} btn-sm">${sigPassed ? 'pass' : 'fail'}</span>
          </div>
          ${findings.length > 0 ? `<div class="signal-findings">${findings.map(f => `<div style="margin-bottom:0.25rem">- ${escapeHtml(typeof f === 'string' ? f : f.message || JSON.stringify(f))}</div>`).join('')}</div>` : ''}
        `;
      }).join('');
    }
    return `<div style="padding:0.5rem;color:var(--text-muted);font-size:0.85rem">${result.message ? escapeHtml(result.message) : 'No signal details available'}</div>`;
  }

  // Trust routing stage: show risk breakdown
  if (stageLower === 'trust_routing') {
    let html = '';
    if (result.risk_score !== undefined) {
      const riskPct = (result.risk_score * 100).toFixed(0);
      const riskColor = result.risk_score >= 0.7 ? 'var(--red)' : result.risk_score >= 0.4 ? 'var(--amber)' : 'var(--green)';
      html += `<div style="padding:0.5rem 0.75rem;font-size:0.85rem">
        <span style="color:var(--text-secondary)">Risk Score:</span>
        <span style="font-family:var(--font-mono);font-weight:700;color:${riskColor};margin-left:0.5rem">${riskPct}%</span>
        ${result.deploy_route ? `<span style="margin-left:1rem;color:var(--text-secondary)">Route:</span> ${statusBadge(result.deploy_route)}` : ''}
      </div>`;
    }
    const factors = result.factors || result.risk_factors || [];
    const factorList = Array.isArray(factors) ? factors : Object.entries(factors).map(([k, v]) => ({name: k, score: v}));
    if (factorList.length > 0) {
      html += '<div class="risk-factors">';
      for (const f of factorList) {
        const name = f.name || f.label || 'unknown';
        const score = f.score !== undefined ? f.score : f.value;
        const display = typeof score === 'number' ? (score * 100).toFixed(0) + '%' : String(score || '');
        const fColor = typeof score === 'number' ? (score >= 0.7 ? 'var(--red)' : score >= 0.4 ? 'var(--amber)' : 'var(--green)') : 'var(--text-secondary)';
        html += `<div class="risk-factor">
          <span class="risk-factor-label">${escapeHtml(name.replace(/_/g, ' '))}</span>
          <span class="risk-factor-value" style="color:${fColor}">${escapeHtml(display)}</span>
          ${f.description ? `<span style="font-size:0.75rem;color:var(--text-muted);display:block">${escapeHtml(f.description)}</span>` : ''}
        </div>`;
      }
      html += '</div>';
    }
    return html || `<div style="padding:0.5rem;color:var(--text-muted);font-size:0.85rem">${result.message ? escapeHtml(result.message) : 'No routing details available'}</div>`;
  }

  // Default: show message
  return `<div style="padding:0.5rem 0.75rem;color:var(--text-secondary);font-size:0.85rem">${result.message ? escapeHtml(result.message) : 'No additional details'}</div>`;
}

function showApproveDialog(runId) {
  showModal(`
    <div class="modal-header">
      <span class="modal-title">Approve Run</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:1rem;color:var(--text-secondary)">Approving run <span class="mono">${truncateId(runId)}</span></p>
      <div class="form-group">
        <label class="form-label">Comment (optional)</label>
        <input class="form-input" id="approve-comment" placeholder="Looks good to me">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" onclick="approveRun('${runId}')">Approve</button>
    </div>
  `);
}

function showRejectDialog(runId) {
  showModal(`
    <div class="modal-header">
      <span class="modal-title">Reject Run</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:1rem;color:var(--text-secondary)">Rejecting run <span class="mono">${truncateId(runId)}</span></p>
      <div class="form-group">
        <label class="form-label">Reason (required)</label>
        <textarea class="form-textarea" id="reject-reason" placeholder="Explain why this run should be rejected..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="rejectRun('${runId}')">Reject</button>

async function approveRun(runId) {
  const comment = document.getElementById('approve-comment')?.value?.trim() || null;
  try {
    await api.post(`/runs/${runId}/approve`, { comment });
    closeModal();
    toast('Run approved', 'success');
    await loadPipelineTable();
  } catch (e) {
    toast(`Failed to approve: ${e.message}`, 'error');
  }
}

async function rejectRun(runId) {
  const reason = document.getElementById('reject-reason')?.value?.trim();
  if (!reason) { toast('Reason is required', 'error'); return; }
  try {
    await api.post(`/runs/${runId}/reject`, { reason });
    closeModal();
    toast('Run rejected', 'info');
    await loadPipelineTable();
  } catch (e) {
    toast(`Failed to reject: ${e.message}`, 'error');
  }
}

// ===== Agent Status Panel (dashboard) =====
function phaseBadge(phase) {
  const labels = {
    idle: 'Idle', claiming: 'Claiming', calling_llm: 'LLM',
    writing_files: 'Writing', running_tests: 'Testing',
    submitting: 'Submitting', waiting: 'Waiting',
  };
  const label = labels[phase] || phase || 'Unknown';
  // Both phase and label are sanitized through escapeHtml
  return `<span class="phase-badge phase-${escapeHtml(phase || 'idle')}">${escapeHtml(label)}</span>`;
}

function formatElapsed(seconds) {
  if (!seconds || seconds < 1) return '';
  if (seconds < 60) return Math.round(seconds) + 's';
  if (seconds < 3600) return Math.round(seconds / 60) + 'm';
  return (seconds / 3600).toFixed(1) + 'h';
}

async function freezeClick() {
  if (!confirm('FREEZE the pipeline? This will block ALL new claims and submissions.')) return;
  try {
    await api.post('/pipeline/freeze');
    toast('Pipeline FROZEN', 'warning');
    renderDashboard();
  } catch (e) {
    toast('Failed to freeze: ' + e.message, 'error');
  }
}

async function unfreezeClick() {
  if (!confirm('Unfreeze the pipeline? Agents will be able to claim and submit work again.')) return;
  try {
    await api.post('/pipeline/unfreeze');
    toast('Pipeline unfrozen', 'success');
    renderDashboard();
  } catch (e) {
    toast('Failed to unfreeze: ' + e.message, 'error');
  }
}

async function loadAgentStatusPanel() {
  const body = document.getElementById('agent-status-body');
  if (!body) return;
  try {
    const statuses = await fetch('/api/agents/status').then(r => r.ok ? r.json() : []);
    if (!statuses || statuses.length === 0) {
      body.textContent = 'No agents active';
      body.style.cssText = 'color:var(--text-muted);font-size:0.85rem;padding:0.5rem';
      return;
    }
    // All dynamic values are sanitized via escapeHtml() before insertion
    const cards = statuses.map(s => {
      const isActive = s.phase !== 'idle';
      const dotColor = isActive ? 'var(--blue)' : 'var(--text-muted)';
      const agentId = escapeHtml(s.agent_id);
      const elapsed = formatElapsed(s.elapsed_seconds);
      const taskTitle = s.current_task_title ? escapeHtml(s.current_task_title) : '';
      return `<div class="agent-live-card ${isActive ? 'active' : ''}">
        <div style="display:flex;align-items:center;gap:0.5rem">
          <div style="width:8px;height:8px;border-radius:50%;background:${dotColor}"></div>
          <strong style="font-size:0.9rem">${agentId}</strong>
        </div>
        <div class="agent-phase-row">
          ${phaseBadge(s.phase)}
          <span class="lease-countdown">${escapeHtml(elapsed)}</span>
        </div>
        ${taskTitle ? `<div class="agent-task-label" title="${taskTitle}">${taskTitle}</div>` : ''}
      </div>`;
    }).join('');
    body.innerHTML = `<div class="agent-status-grid">${cards}</div>`;
  } catch (e) {
    body.textContent = 'Agent status unavailable';
    body.style.cssText = 'color:var(--text-muted);font-size:0.85rem';
  }
}

// ===== Agents =====
async function renderAgents() {
  app.innerHTML = `
    <div class="section-header">
      <h1 class="section-title">Agents</h1>
    </div>
    <div class="card" style="margin-bottom:1.25rem">
      <div class="card-header">
        <span class="card-title">Live Status</span>
        <span style="font-size:0.75rem;color:var(--text-muted)">Updates via WebSocket</span>
      </div>
      <div class="card-body" id="agents-live-status">
        <div class="loading-state"><div class="spinner"></div><span>Loading...</span></div>
      </div>
    </div>
    <div id="agents-grid" class="agent-grid">
      <div class="loading-state" style="grid-column:1/-1"><div class="spinner spinner-lg"></div><span>Loading agents...</span></div>
    </div>
  `;

  // Load live status panel at top of agents page
  try {
    const statuses = await fetch('/api/agents/status').then(r => r.ok ? r.json() : []);
    const liveBody = document.getElementById('agents-live-status');
    if (statuses && statuses.length > 0) {
      const cards = statuses.map(s => {
        const isActive = s.phase !== 'idle';
        const dotColor = isActive ? 'var(--blue)' : 'var(--text-muted)';
        const agentId = escapeHtml(s.agent_id);
        const elapsed = formatElapsed(s.elapsed_seconds);
        const taskTitle = s.current_task_title ? escapeHtml(s.current_task_title) : '';
        const taskId = s.current_task_id ? escapeHtml(s.current_task_id.substring(0, 8)) : '';
        return `<div class="agent-live-card ${isActive ? 'active' : ''}">
          <div style="display:flex;align-items:center;gap:0.5rem">
            <div style="width:8px;height:8px;border-radius:50%;background:${dotColor}"></div>
            <strong style="font-size:0.9rem">${agentId}</strong>
          </div>
          <div class="agent-phase-row">
            ${phaseBadge(s.phase)}
            <span class="lease-countdown">${escapeHtml(elapsed)}</span>
          </div>
          ${taskTitle ? `<div class="agent-task-label" title="${taskTitle}">${taskTitle}</div>` : ''}
          ${taskId && isActive ? `<div style="font-size:0.7rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:0.15rem">task:${taskId}</div>` : ''}
        </div>`;
      }).join('');
      liveBody.innerHTML = `<div class="agent-status-grid">${cards}</div>`;
    } else {
      liveBody.textContent = 'No agents have connected yet';
      liveBody.style.cssText = 'color:var(--text-muted);font-size:0.85rem;padding:0.5rem';
    }
  } catch (_) {}

  const container = document.getElementById('agents-grid');
  let agents;
  try {
    // Try routing endpoint first for richer data, fall back to basic agents endpoint
    try {
      agents = await api.get('/routing/agents');
    } catch (_) {
      agents = await api.get('/agents');
    }
    if (!agents || agents.length === 0) {
      container.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">&#9881;</div><div class="empty-state-text">No agents registered.</div></div>';
      return;
    }
    // Fetch live statuses to merge with agent data
    let liveStatusMap = {};
    try {
      const liveStatuses = await fetch('/api/agents/status').then(r => r.ok ? r.json() : []);
      (liveStatuses || []).forEach(s => { liveStatusMap[s.agent_id] = s; });
    } catch (_) {}

    // All dynamic text escaped via escapeHtml() to prevent XSS
    container.innerHTML = agents.map(a => {
      const trustScore = a.overall_trust ?? a.trust_score ?? 0.5;
      const totalDeploys = a.total_deploys ?? a.deploy_count ?? 0;
      const successRate = a.success_rate ?? (totalDeploys > 0 ? ((a.successful_deploys || 0) / totalDeploys * 100) : 0);
      const initials = (a.name || a.agent_id || '??').substring(0, 2).toUpperCase();
      const domainScores = a.domain_trust || a.trust_scores || {};
      const liveStatus = liveStatusMap[a.agent_id];
      const livePhase = liveStatus ? liveStatus.phase : null;
      const agentStatus = livePhase && livePhase !== 'idle' ? 'busy' : (a.status || 'available');
      const queueDepth = a.queue_depth ?? a.task_count ?? null;
      const capabilities = a.capabilities || [];

      return `
        <div class="agent-card" onclick="this.classList.toggle('expanded')">
          <div class="agent-card-header">
            <div class="agent-avatar">${escapeHtml(initials)}</div>
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:0.5rem">
                <div class="agent-name">${escapeHtml(a.name || a.agent_id || 'Unknown Agent')}</div>
                <div class="agent-status-dot ${escapeHtml(agentStatus)}" title="${escapeHtml(agentStatus)}"></div>
                ${livePhase && livePhase !== 'idle' ? phaseBadge(livePhase) : ''}
              </div>
              <div class="agent-id">${truncateId(a.agent_id)}</div>
            </div>
            ${queueDepth !== null ? `<div style="text-align:right">
              <div class="agent-stat-value">${queueDepth}</div>
              <div class="agent-stat-label">queued</div>
            </div>` : ''}
          </div>
          ${capabilities.length > 0 ? `<div class="capability-badges">${capabilities.map(c => {
            const capLower = (c || '').toLowerCase();
            const capCls = capLower.includes('code') || capLower.includes('implement') ? 'cap-code' :
                           capLower.includes('test') ? 'cap-test' :
                           capLower.includes('deploy') ? 'cap-deploy' :
                           capLower.includes('review') ? 'cap-review' : 'cap-default';
            return `<span class="capability-badge ${capCls}">${escapeHtml(c)}</span>`;
          }).join('')}</div>` : ''}
          <div style="margin-top:0.75rem">
            <div style="display:flex;justify-content:space-between;font-size:0.8rem">
              <span style="color:var(--text-muted)">Trust Score</span>
              <span class="mono" style="color:${trustColor(trustScore)}">${(trustScore * 100).toFixed(0)}%</span>
            </div>
            <div class="trust-bar">
              <div class="trust-bar-fill" style="width:${trustScore * 100}%;background:${trustColor(trustScore)}"></div>
            </div>
          </div>
          <div class="agent-stats">
            <div>
              <div class="agent-stat-label">Deploys</div>
              <div class="agent-stat-value">${totalDeploys}</div>
            </div>
            <div>
              <div class="agent-stat-label">Success</div>
              <div class="agent-stat-value">${typeof successRate === 'number' ? successRate.toFixed(0) : successRate}%</div>
            </div>
            <div>
              <div class="agent-stat-label">Status</div>
              <div class="agent-stat-value" style="text-transform:capitalize">${escapeHtml(agentStatus)}</div>
            </div>
          </div>
          ${liveStatus && liveStatus.current_task_title ? `
            <div style="margin-top:0.5rem;padding:0.5rem 0.75rem;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.15);border-radius:6px;font-size:0.8rem">
              <div style="color:var(--text-muted);font-size:0.7rem;text-transform:uppercase;font-weight:600;margin-bottom:0.2rem">Current Task</div>
              <div style="color:var(--text-primary)">${escapeHtml(liveStatus.current_task_title)}</div>
              <div style="color:var(--text-muted);font-size:0.75rem;margin-top:0.15rem">${formatElapsed(liveStatus.elapsed_seconds)} elapsed</div>
            </div>
          ` : ''}
          <div class="agent-detail">
            <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem;text-transform:uppercase;font-weight:600">Domain Trust</div>
            ${Object.keys(domainScores).length > 0 ? Object.entries(domainScores).map(([domain, score]) => `
              <div class="domain-trust">
                <span class="domain-trust-label">${escapeHtml(domain)}</span>
                <div style="display:flex;align-items:center;gap:0.5rem;flex:1;margin-left:1rem">
                  <div class="progress-bar">
                    <div class="progress-fill" style="width:${(score || 0) * 100}%;background:${trustColor(score || 0)}"></div>
                  </div>
                  <span class="mono" style="font-size:0.8rem">${((score || 0) * 100).toFixed(0)}%</span>
                </div>
              </div>
            `).join('') : '<p style="color:var(--text-muted);font-size:0.85rem">No domain-specific data</p>'}
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-text">Error: ${escapeHtml(e.message)}</div></div>`;
  }
}
